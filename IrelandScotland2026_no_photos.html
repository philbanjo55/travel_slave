arded his 29-foot cabin cruiser Shadow V with six family members. At 11:15 AM, a 50-pound gelignite bomb planted by IRA operative Thomas McMahon was detonated by remote control from shore. Mountbatten, his 14-year-old grandson Nicholas Knatchbull, 15-year-old local boat boy Paul Maxwell, and 83-year-old Dowager Lady Brabourne were killed. McMahon had been arrested at a routine checkpoint 80 miles away — two hours before the bomb detonated. That same afternoon, the IRA's Warrenpoint Ambush killed 18 British soldiers — the deadliest single attack on the British Army during the Troubles. The events were dramatized in Season 4 of Netflix's The Crown (2020).\n\nIronically, Mountbatten supported Irish unity. Former MI6 chief Maurice Oldfield had personally warned him not to travel to Ireland in 1979. Mountbatten replied: \"But the Irish are my friends.\" Oldfield responded: \"Not all of them.\"\n\nMullaghmore Head is now ranked among the top ten big-wave surfing spots in the world. In 2020, surfer Conor Maguire rode an estimated 60-foot wave here, described as \"cold as Mavericks, a lip like Teahupoo.\" ","alltrails":"https://www.alltrails.com/trail/ireland/county-sligo/mullaghmore-head-loop?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality","artist":"Primary: 4x5 Intrepid · FP4+ · Red 29 (open Atlantic sky, want drama)\n\nSHOT 1 — Castle + Benbulben Compression ⭐ HERO\nPosition: southwest headland road, pull over facing northeast\n300mm · Benbulben fills upper third, castle mid-frame on its promontory\nZone targets: castle Zone V–VI, Benbulben plateau Zone III–IV (goes dark with Red 29), foreground cliffs Zone III, sky Zone II–III\nBest light: golden hour 8:30–10 PM — castle front-lit, Benbulben in shadow behind\nAfternoon alternative: 2–4 PM gives strong sidelight, harsher but workable\n\nSHOT 2 — Surge Channel + Castle Silhouette\nPosition: northwest headland rocks, shooting west along cliff shelves\n135mm · Layered rock shelves foreground Zone II–III, surge white Zone VIII, castle tiny upper left Zone II (silhouette)\nBest in overcast or stormy — glare kills this shot in direct sun\n1–4 sec long exposure · Red 29 · Tripod low on rocks · Watch wave sets\n\nSHOT 3 — Secret Cave ⚠️ LOW TIDE ONLY\nPosition: northwest headland, rock arch at water level\nTwo options:\n  A) Shoot INTO cave from outside: arch frame, dark interior Zone I–II, green algae floor Zone IV–V\n  B) Shoot OUT from inside: sky/grass reveal through arch, extreme contrast — expose for exterior Zone VI, let interior go Zone I\n135mm for both · No filter needed — contrast is inherent\n⚠️ Watch your back for surge — do not get trapped inside\n\nSHOT 4 — Rocky Cove with Castle Upper Left\nPosition: south side of headland loop, shooting northwest\n135mm · Cove and surge foreground, cliff line leading to castle upper left\nAfternoon light (2–4 PM) works well here · Red 29\n\nDay 1 priority: Shots 2 + 3 (cave if tide allows) + 4\nDay 3 priority: Scout at 2 PM · Shot 1 golden hour"}],"sb":{"n":"Innisfreedom Cabin — Ballintogher, Sligo","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417"},"sa":{"n":"Innisfreedom Cabin — Ballintogher, Sligo","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417"},"checked":true},{"id":4,"date":"Jun 25","dow":"Thu","region":"ireland","checked":true,"title":"Mayo Day — Knocknarea + Downpatrick Head","summary":"Optional Knocknarea sunrise · Carrowmore · Drive Mayo · Downpatrick Head + Dún Briste sea stack","mc":[54.29,-9.0],"mz":9,"stops":[{"n":"Wake Up","ic":"☀️","t":"6:40 AM","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417","info":"Starting location: Innisfreedom Cabin. Drive to Downpatrick Head: ~90 min via N59 through Ballina."},{"t":"8:30 AM","ic":"📷","n":"📵 Downpatrick Head + Dún Briste ⭐","c":[54.3236,-9.3439],"info":"<b>Downpatrick Head + Dún Briste</b> — 45m isolated sea stack, 80m offshore, separated from the mainland in a storm in 1393. The layered limestone bedding — 25 million years of strata — is visible in every shot. The WW2 lookout post on the mainland cliff adds human scale and historical context. Unfenced cliff edge throughout — treat it with respect, especially with wind.<br><br><b>Sea cave access — read carefully:</b> The cave shots (Imgs 5 & 7) require descending a series of slippery ledges from near the car park around the base of the headland. <b>North Mayo Tourism explicitly states they do not encourage this and advise hiring a local guide.</b> The rocks are covered in sea life and extremely slippery. Only attempt at very low tide, calm sea, and with a second person present. A local guide from Ballycastle is strongly recommended — ask at the village before committing. If conditions are not right, skip the cave and the cliff top shots are still exceptional.<br><br><b>Blowhole (Poll na Seantainne):</b> 150m inland from the cliff edge, a huge underground cave links it to the sea. Fenced viewing platform. When swell is running, spray shoots up from the chimney — worth checking on arrival.","photo":"<b>Shot 1 — Cliff top establishing shot (Img 1) — on arrival:</b> Portrait orientation. Mainland cliff as dark Zone I–II mass on the left, stack on the right with layered bedding Zone III–VI, churning white surf Zone VII–VIII in the channel between. WW2 lookout post visible upper left — keep it in for scale and history. 210mm portrait, from the cliff top path.<br><br><b>Shot 2 — Wide drama, both stacks + storm sky (Img 3):</b> 90mm ultra-wide, red filter, sky takes up half the frame. Dark sky Zone II–III, cloud masses Zone V–VIII, sea Zone III–IV, white surf Zone VII–VIII. Two stacks visible at this scale — completely different reading than the close-up shots.<br><br><b>Shot 3 — Geology shot, cliff edge above (Img 4):</b> Clean and simple. Stack centered, headland grass foreground Zone IV (red filter to III), every bedding layer readable, open sea and sky behind. 150mm. Quartzite light bands punch Zone VI–VII against dark shale Zone II–III.<br><br><b>Shot 4 — Water level hero (Imgs 2 & 6) — tide permitting:</b> Descend to the rocky platform at the base. Stack fills upper two-thirds of frame, water silked to Zone IV–V, foreground rocks Zone II–III. 210mm, 30–60 sec. Shoot multiples — Img 2 has more foreground water movement, Img 6 cleaner horizon. Choose in the darkroom.<br><br><b>Shot 5 — Sea cave arch + tidal pool reflection (Imgs 5 & 7) — LOW TIDE + LOCAL GUIDE ONLY:</b> Cave arch as Zone I frame, stack Zone IV–V in middle distance, tidal pool reflects stack and sky Zone V–VI. 90mm, tripod on cave floor, camera as low as possible to maximize the reflection. Long exposure smooths the pool. This is potentially the defining image of the Ireland leg — but only attempt with local guide and at lowest tide.<br><br><b>Shot 6 — Wide south cliff context (Img 8):</b> Full geography — stack left, mainland cliff with lookout post right, open sea between. 90mm, red filter. Stack Zone III–V, sea Zone III–IV, white surf Zone VII.<br><br><b>Shot 7 — Blowhole spray:</b> 90mm from the safe fenced platform. Red filter. Pre-focus, wait for surge peak (every 15–20 sec). Spray column Zone VII–VIII against Zone III–IV sky. 1/30 sec to freeze or 2+ sec to blur — both work.<br><br><b>Shot 8 — Sunset silhouette (if staying):</b> Stack Zone I–II against Zone VI–VIII sky. 210mm. The flat top with ruined walls creates a distinctive jagged silhouette.","log":"📵 NO SIGNAL — remote Mayo headland. Satellite device active. Download offline maps.\nFree entry · Free parking (large car park, recently extended)\n⚠️ Do not leave valuables visible in car — break-ins reported\nWalk: 500m / 10 min from car park to stack viewpoint · Grass path, can be very muddy\nAllTrails: Downpatrick Head · 1.4km · Easy · ~20 min\nCoffee kiosk 'Tea by the Sea' at car park\n⚠️ NO fence at cliff edge — unguarded 40m drop · Watch bubble grass underfoot\n⚠️ No visit in wind warning conditions\n\nCAVE ACCESS — LOW TIDE ONLY:\nLedges start near car park and traverse around base of cliffs to cave entrance\nCave faces north directly onto Dún Briste · Midsummer light floods in evenings\n⚠️ Extremely slippery — sea life on rocks · Risk of tide trapping + rogue waves\n⚠️ Do not attempt without checking tide tables + local advice first\nTide resource: www.tideschart.com/Ireland/Ballycastle-Mayo\n\nLOCAL CONTACTS FOR CAVE CONDITIONS:\nMick Hunt (local photographer, documented cave access):\n  Email: mhd@live.ie\n  Instagram: @mickh51\n  Website: www.mhphotography.ie\n\nGareth McCormack (professional landscape photographer, shot from cave Jul 11):\n  Website contact form: www.garethmccormack.com\n  Instagram: @garethmccormack\n  Based in Enniscrone, Co. Sligo — local to the area\n\nGareth's article on the cave shot: garethmccormack.com/midsummer-magic-at-downpatrick-head\nMick Hunt's Flickr + blog post: flickr.com/photos/mickhuntphotography/43790671741","map":"https://maps.google.com/?cid=18038366944767474902","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"The 45-metre sea stack Dún Briste was separated from the mainland during a massive overnight Atlantic storm in 1393. A passage in the journal of MacFirbis describes \"the cutting off of the rock of Duross promontory by the sea.\" People were stranded atop the newly created island and had to be rescued using ship's ropes. In 1981, a helicopter expedition discovered remains of two medieval buildings, field walls, cultivation ridges, and a corn-grinding quern still sitting on the grassy summit — a frozen snapshot of the community that lived there when the land fell away.\n\nThe headland's patron saint legend tells of a confrontation between St. Patrick and the tyrannical pagan chieftain Crom Dubh. When Crom Dubh refused to convert, Patrick struck the ground with his crozier, splitting the headland and casting Crom Dubh and his fort into the sea — creating Dún Briste. The spectacular blowhole Poll na Seantainne (\"Hole of the Old Fire\") connects to the sea via an enormous underground cave; on stormy days, spray shoots skyward like smoke, giving the feature its name. During the 1798 Rebellion, 25 men — Irish and French soldiers — took refuge on a ledge inside the blowhole. The tide came in before ladders could be replaced, and all 25 drowned.\n\nA WWII lookout post (LOP 64) survives on the headland, alongside the stone \"ÉIRE 64\" marker — one of 83 placed around Ireland's coastline to signal neutral territory to passing aircraft. In August 2016, Scottish climber Iain Miller successfully climbed the sea stack after four failed attempts, reaching the summit on the anniversary of the Mountbatten assassination.\n\nPop culture: County Mayo — the county containing Downpatrick Head — is experiencing a cultural moment. Martin McDonagh's The Banshees of Inisherin (2022), filmed on Achill Island 30 miles south, won the BAFTA for Best Film, earned six Academy Award nominations, and put the West of Ireland landscape before a global audience. The stark Mayo coastline has been described as \"the landscape that made the film.\" Liam Neeson, who starred in Rob Roy (1995) filmed partially in Glencoe, has spoken extensively about the influence of the Irish west coast on his sensibility as an actor. Louis Marcus's 1959 documentary Fleadh Cheoil filmed traditional music gatherings in Mayo; the county's music tradition fed directly into the folk revival. The area's prehistory inspired Heinrich Böll's Irish Journal (1957), which helped spark German tourism to the west of Ireland and remains in print in 18 languages.","alltrails":"https://www.alltrails.com/trail/ireland/county-mayo/downpatrick-head--2?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality","artist":"Primary: 4x5 Intrepid · FP4+ · Red 25\nAllow 3 hours — scout first, then shoot.\n\nCLIFFTOP SHOTS (no cave required):\n\nShot 1 — Dún Briste Stack from Clifftop ⭐ HERO\nPosition: main viewpoint near WWII lookout building\n135mm landscape · stack fills right third · layered rock strata Zone III–VI\nSky with Red 25 → Zone II–III · Atlantic surf base Zone VII–VIII\n300mm option: compress stack against horizon, isolate strata layers\n\nShot 2 — Stack from Headland Tip (east side)\nWalk east along clifftop past the lookout building\nSheer side of stack visible against Mayo coastline backdrop\n135mm · Red 25 · strong diagonal composition\n\nShot 3 — Blowhole (Poll na Seantainne)\nFenced viewing platform · shoot down into the chasm\n135mm · extreme foreground to horizon · Red 25\nBest in swell — foam erupts upward\n\nCAVE SHOT — LOW TIDE + CALM SEAS ONLY:\n\nShot 4 — Dún Briste from Sea Cave ⭐ HERO\nContact Mick Hunt (mhd@live.ie) or Gareth McCormack before trip to confirm access\nLedges from near car park traverse around base of cliffs to cave entrance\nCamera low on rock platform above tidal pool · 135mm\nStack framed in cave arch · pool reflection if calm\nZone targets: cave interior I–II, stack face IV–VI, sky II–III\nMidsummer evening light (Jun 25 ~8–10 PM): sun comes in from northwest, bounces off right cave wall — sandstone glows warm even in B&W tonal range\nMorning visit (8:30 AM): east light, cooler tones, stack shadow side — different but valid\n⚠️ Watch wave sets before descending · Keep back from edge · Exit before tide turns\n⚠️ 4x5 on wet rocks in wind — dark cloth management critical"},{"n":"⚠️ Aughris Head","ic":"📷","t":"1:10 PM","dur":120,"c":[54.2724669,-8.7562016],"map":"https://maps.google.com/?cid=ChIJIdKOGuvPXkgRg3C9YHud7GU","info":"Aughris Head is a rugged, largely undiscovered headland on the south shore of Sligo Bay. The clifftop loop walk passes a WWII lookout post, a cliff-edge Iron Age promontory fort, a holy well associated with St. Patrick, and the ruins of a deserted village. Views across Sligo Bay to Benbulben and Knocknarea are exceptional. Park at the Beach Bar — a traditional Irish pub at the trailhead.","log":"⚠️ PATCHY SIGNAL — rural Sligo coast, unreliable. Download offline maps.\n⚠️ OPTIONAL STOP — after a 3hr session at Downpatrick, take this if energy allows\nAfter Aughris: ~25 min back to cabin. If time/energy remains, reshoot window available\nfor Streedagh, Glencar, Mullaghmore, or Devil's Chimney before heading home.\n\nPark: Beach Bar car park · Free · Aughris, Co. Sligo\nAllTrails: Sligo Bay Circular · 2.2 mi · Easy · ~47 min · 4.8 stars\nTrail refs: sligowalks.ie/walks/aughris · aughris.com/the-walk\nAllow 2 hours with camera stops\n⚠️ Road to Aughris is narrow — not suitable for coaches or campervans\n⚠️ Path can be muddy and slippery after rain — sturdy footwear essential\n⚠️ Some unfenced cliff sections — take care\n⚠️ Start of walk not well signposted — follow Wild Atlantic Way signs south from Sligo,\nturn at Aughris Head sign, continue 200-300m past the Beach Bar junction,\npark at sharp bend on left before cul-de-sac · Trail starts between house garden and pier\nNo dogs allowed on cliff path section (crosses farmland)\nBeach Bar pub on site — food, soup, toasties, Guinness · Check opening hours in advance\nOn a clear day: views to Benbulben, Knocknarea, and as far as Slieve League in Donegal","artist":"Primary: 4x5 Intrepid · FP4+ · Red 25\n\nShot 1 — Promontory Fort on Cliff Edge ⭐\nAncient Iron Age fort perched on the cliff tip\n135mm · fort ruins foreground Zone III–IV, Atlantic below Zone II, sky with Red 25 Zone II–III\nShoot late afternoon — light comes from the west, raking across the cliff face\n\nShot 2 — Benbulben Across Sligo Bay\n300mm compression · Benbulben flat top across the water\nCompletely different angle from the forest walk — shooting south across open water\nZone targets: water Zone III–IV, Benbulben plateau Zone III–IV with Red 25\n\nShot 3 — Deserted Village Ruins\nStone walls in open moorland · 135mm\nStrong foreground subject — famine-era abandonment\nLook for walls that frame Benbulben or the bay beyond\n\nShot 4 — WWII Lookout Post\nSmall stone building on the headland · similar subject to Downpatrick Head\n135mm · Red 25 · shoot with Atlantic horizon behind","hist":"Aughris Head has been inhabited since prehistoric times — the promontory fort dates to the Iron Age, likely 500 BC to 400 AD, built defensively on the cliff edge above the Atlantic. The holy well on the headland is one of dozens across Sligo associated with St. Patrick's 5th-century mission. The deserted village at the heart of the headland was abandoned during or after the Great Famine (1845–52), when the rural Mayo and Sligo coastline lost enormous proportions of its population to death and emigration. During World War II, Ireland's neutrality required coastal monitoring — the lookout post here was one of over 80 Emergency Observation Posts built along the west coast between 1939 and 1942, manned by the Local Security Force.","alltrails":"https://www.alltrails.com/trail/ireland/county-sligo/sligo-bay-circular?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"drive_override":100}],"sb":{"n":"Innisfreedom Cabin — Ballintogher, Sligo","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417"},"sa":{"n":"Innisfreedom Cabin — Ballintogher, Sligo","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417"}},{"id":5,"date":"Jun 26","dow":"Fri","region":"ireland","title":"Departure Morning — Sligo to Dublin","summary":"Optional final shoot · Check out cabin · Drive Dublin · Moxy Dublin City check-in","mc":[53.8,-7.5],"mz":7,"stops":[{"n":"Wake Up","ic":"☀️","t":"6:08 AM","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417","info":"Starting location: Innisfreedom Cabin — Ballintogher, Sligo. Drive to first stop: ~41 min."},{"t":"7:00 AM","ic":"📷","n":"Optional Final Shoot","c":[54.3402,-8.3685],"info":"Only if conditions are spectacular. Glencar 25 min from cabin; roadside Benbulben 20 min.","photo":"Glencar in morning mist: second chance at the grotto. Benbulben roadside from N15 gives the classic flat-top profile.","log":null,"map":"https://maps.google.com/?cid=6823112005562994574"},{"t":"10:00 AM","ic":"🏡","n":"Check Out — Innisfreedom","c":[54.22781,-8.35417],"info":"Load all gear. Return key per cabin instructions. Check-out by 11am.","log":"✅ SIGNAL OK — cabin has WiFi\nInnisfreedom, Killerry, Ballintogher · Conf: 5869191106","map":"https://www.google.com/maps?q=54.22781,-8.35417"},{"t":"12:00 PM","ic":"🚗","n":"Drive Dublin — N4/M4","c":null,"info":"Straight shot. Drop Enterprise at Dublin Airport arrivals first, then Airlink bus or taxi to Moxy.","log":"Enterprise return: Dublin Airport Terminal 1 · Conf: 73391556677627\nAirlink 747 bus: Airport → city centre ~30 min / €8","map":null},{"t":"2:00 PM","ic":"🏨","n":"Check In — Moxy Dublin City","c":[53.3444,-6.2672],"info":"James and Dad arriving. First afternoon in Dublin — easy wander, pubs, food. Plan tomorrow over dinner.","log":"Moxy Dublin City\nPhil Conf: 99210319 · James Conf: 99222693\nJun 26–28 · 2 nights · 2 rooms (Twin each)","map":"https://maps.google.com/?q=Moxy+Dublin+City"}],"sb":{"n":"Innisfreedom Cabin — Ballintogher, Sligo","c":[54.22781,-8.35417],"map":"https://www.google.com/maps?q=54.22781,-8.35417"},"sa":{"n":"Moxy Dublin City","c":[53.3444,-6.2672],"map":"https://maps.google.com/?q=Moxy+Dublin+City+Hotel"}},{"id":6,"date":"Jun 27","dow":"Sat","region":"dublin","title":"Dublin — Full Day","summary":"Sing Street filming locations · Guinness Storehouse · Jameson Distillery · Dalkey by DART · Dalkey Island","mc":[53.33,-6.23],"mz":12,"stops":[{"n":"Wake Up","ic":"☀️","t":"8:32 AM","c":[53.3444,-6.2672],"map":"https://maps.google.com/?q=Moxy+Dublin+City+Hotel","info":"Starting location: Moxy Dublin City. Drive to first stop: ~8 min."},{"t":"9:00 AM","ic":"🎬","n":"✅ Sing Street Walk — The Liberties","c":[53.3308,-6.2675],"info":"Self-guided walk through the south Dublin filming locations. All within 20 min walk of each other.","photo":"📍 Synge Street CBS — the actual school (exterior unchanged)\n📍 40 Synge Street — Raphina's doorstep\n📍 143 Greenlea Road — Eamon's house / band rehearsal space\n📍 Fusco's Café, Meath Street — the chipper hangout\n📍 St. Catherine's Park, Hanbury Lane — 'A Beautiful Sea' video location","log":"✅ SIGNAL OK — Dublin city centre\nStart: Synge Street CBS, Dublin 8\nAll within 20 min walk in Liberties/south Dublin","map":"https://maps.google.com/?q=Synge+Street+CBS+Dublin+8"},{"t":"11:00 AM","ic":"🍺","n":"✅ Guinness Storehouse","c":[53.3419,-6.2869],"info":"Book in advance — sells out, especially weekends. 7 floors of exhibition. Gravity Bar at the top: 360° view of Dublin over your complimentary pint.","log":"✅ SIGNAL OK — Dublin city centre\nSt James's Gate, Dublin 8\nBook: guinness-storehouse.com","map":"https://maps.google.com/?q=Guinness+Storehouse+Dublin"},{"t":"1:30 PM","ic":"🍽️","n":"✅ Lunch — Dudley's Bar, Thomas St","c":[53.3435,-6.2812],"info":"Named after Thomas 'Bang Bang' Dudley, a famous Dublin character. 28 craft beer taps, proper pub food.","log":"48 Thomas St, The Liberties, Dublin D08 Y44A","map":"https://maps.google.com/?q=Dudleys+Bar+48+Thomas+Street+Dublin"},{"t":"2:30 PM","ic":"🥃","n":"✅ Jameson Distillery — Bow St","c":[53.3476,-6.2793],"info":"The original Dublin distillery in Smithfield — 15 min walk from Guinness. Book in advance. Interactive tour with whiskey tasting.","log":"✅ SIGNAL OK — Dublin city centre\nBow St, Smithfield, Dublin 7\nBook: jamesonwhiskey.com","map":"https://maps.google.com/?q=Jameson+Distillery+Bow+Street+Dublin"},{"t":"5:00 PM","ic":"🚂","n":"✅ DART to Dalkey — Coliemore Harbour","c":[53.2738,-6.1018],"info":"DART southbound from city center. Alight at Dalkey station, 10 min walk to Coliemore Harbour. WhatsApp Ken the Ferryman before heading down.","log":"✅ SIGNAL OK — Dublin suburb\nDART: Tara St or Pearse → Dalkey (~35 min) · ~€4 return\nKen the Ferryman: WhatsApp +353 85 242 6516\nRuns: Apr–Sep · 10am–6pm · weather permitting\nFerry: €10/person return · Walk-up, no booking needed","map":"https://maps.google.com/?q=Coliemore+Harbour+Dalkey+Dublin"},{"t":"6:30 PM","ic":"🎬","n":"✅ Dalkey Island — Sing Street Ending","c":[53.2699,-6.0933],"info":"The final scene of Sing Street was filmed here — Conor and Raphina's dawn escape. St Begnet's 7th century church ruins, Martello tower, feral goats, grey seals, puffins.","photo":"Coliemore Harbour is the exact film location. Shoot the harbour with Dalkey Island behind. On the island: St Begnet's Church ruins, Martello Tower, views back to Dalkey village and Wicklow Mountains.","log":"✅ SIGNAL OK — Dublin city centre\nKen the Ferryman: +353 85 242 6516 (WhatsApp first)\nFerry: €10/person return · 10 min crossing\nWave from jetty to call boat back","map":"https://maps.google.com/?q=Dalkey+Island+Dublin"},{"t":"8:30 PM","ic":"🍺","n":"✅ Evening — Pub / Live Music","c":[53.3315,-6.2609],"info":"Back by DART. Whelan's on Wexford Street for legendary live music. ⚠️ EI 3226 departs 11:30am tomorrow — leave Moxy by 9:30am.","log":"Whelan's: 25 Wexford Street, Dublin\n⚠️ Tomorrow: EI 3226 DUB→GLA 11:30am · Conf: 2FH8WF\nLeave Moxy by 9:30am","map":"https://maps.google.com/?q=Whelans+Wexford+Street+Dublin"}],"sb":{"n":"Moxy Dublin City","c":[53.3444,-6.2672],"map":"https://maps.google.com/?q=Moxy+Dublin+City+Hotel"},"sa":{"n":"Moxy Dublin City","c":[53.3444,-6.2672],"map":"https://maps.google.com/?q=Moxy+Dublin+City+Hotel"}},{"id":7,"date":"Jun 28","dow":"Sun","region":"scotland","checked":true,"title":"Dublin → Glasgow → Glencoe","summary":"Fly DUB→GLA · A828 west coast route · Castle Stalker · River Coupall evening shoot · Clachaig Inn","mc":[56.5,-4.9],"mz":8,"stops":[{"n":"Wake Up","ic":"☀️","t":"8:35 AM","c":[53.3444,-6.2672],"map":"https://maps.google.com/?q=Moxy+Dublin+City+Hotel","info":"Starting location: Moxy Dublin City. Drive to first stop: ~5 min."},{"t":"9:00 AM","ic":"🏨","n":"Check Out — Moxy Dublin","c":[53.3444,-6.2672],"info":"Check out by 9:30am. Taxi or Airlink bus to Dublin Airport. Allow 45–60 min.","log":"Moxy Dublin City · Conf: 99210319\nAirlink Bus 747: city centre → DUB ~30 min / €8","map":"https://maps.google.com/?q=Moxy+Dublin+City"},{"t":"11:30 AM","ic":"✈️","n":"EI 3226 — DUB → GLA","c":null,"info":"Short hop. Aer Lingus Regional operated by Emerald Airlines. Land Glasgow 12:50pm.","log":"Flight: EI 3226 · Emerald Airlines\nDeparts: 11:30 DUB · Arrives: 12:50 GLA\nConf: 2FH8WF\n⚠️ Leave Moxy by 9:30am","map":null},{"t":"12:50 PM","ic":"🚗","n":"Land GLA — Scotland Car Pickup","c":[55.8694,-4.4333],"info":"Scotland rental car booked by James. Fill up fuel immediately — then take A82 south briefly, join A828 west coast route toward Appin and Castle Stalker. Quieter, more scenic, avoids motorway.","log":"Scotland rental car: booked by James Shaheen\nFuel: Fill up at Glasgow before heading north\nRoute: A82 → A828 west coast via Appin → Ballachulish → Glencoe\n⚠️ A828 adds ~45min vs direct A82 but passes Castle Stalker","map":"https://maps.google.com/?q=Glasgow+Airport+Scotland"},{"t":"4:30 PM","ic":"📷","n":"⚠️ Castle Stalker — Loch Laich ⭐","drive_override":132,"dur":60,"c":[56.5758209,-5.3791462],"info":"14th century tower house on a tidal islet in Loch Laich, an inlet off Loch Linnhe. Mountains of Morvern rise directly behind across the water. One of the most isolated and perfectly composed castle subjects in Scotland — the keep rises straight from the water with no land visible at mid-to-high tide. Afternoon sun hits the west face directly at this hour.","photo":"Three shooting positions: (1) Elevated from Castle Stalker View café hillside — trees framing, full loch geography, 150mm, orange filter. (2) Shore level, rocks foreground, portrait, 90mm, red filter mandatory — pushes green islet grass dark, 30–60 sec to smooth loch surface. (3) Tidal pool reflection — tide dependent, camera extremely low at water surface, 150mm, wait for complete wind lull.","log":"⚠️ PATCHY — rural Argyll, limited. Download offline.\nCastle Stalker View Café car park — free, open access\nShore access: short track down from café\nCoords: 56.5544°N, 5.4806°W · near Appin village\nTide: check tidetimes.ie for Jun 28 Loch Laich before departure\nAllow 45–60 min · No permit required\nDistance from GLA: ~1hr 45min via A828","map":"https://maps.google.com/?cid=6924714907985855331","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"Caisteal an Stalcaire — \"Castle of the Hunter\" — has walls up to 2.7 metres thick rising four storeys from the rock. The name derives from King James IV's passion for falconry; he used the castle as a hunting lodge during frequent Highland visits, and the worn coat of arms above the door may be the Royal Arms placed during his patronage. James IV is believed to have visited frequently around 1490–1513.\n\nThe castle's most notorious episode: around 1620, Duncan Stewart, 7th Chief of Appin, lost it to the Campbells of Airds in a drunken wager — a castle traded for an eight-oared rowing boat. Local legend adds a supernatural dimension: a witch had cursed the Stewarts, predicting they would lose the castle \"by water.\" The Stewarts attempted recapture multiple times. During the 1745 Jacobite Rising, they besieged the Campbell-held castle, but their 2-pound cannonballs merely bounced off the thick medieval walls.\n\nThe castle's most famous appearance is as \"The Castle of Aaaargh\" in Monty Python and the Holy Grail (1975) — the castle where the Holy Grail supposedly resides. It also appears in Highlander: Endgame (2000). The castle fell to ruin after 1840 and its roof was possibly removed to avoid the roof tax. In 1965, Lt. Col. D.R. Stewart Allward began a decade-long restoration — doing the work himself with family and friends. His family still owns the castle and personally conducts limited summer tours for approximately 12 visitors per day."},{"t":"5:50 PM","ic":"📷","n":"Coe River Waterfall","dur":15,"drive_override":25,"c":[56.663489,-5.045851],"info":"A beautiful waterfall on the River Coe tucked just inside the western entrance to the Glencoe valley. First photographic stop of the evening — quieter than the main valley pulloffs further east. Best after rain when the flow is strong.","log":"Ballachulish PH49 4HX · Roadside access\nWear waterproof footwear — muddy and slippery\nAllow 15 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJ15yWY9AxiUgRdbkAaZK8Jgk","imgs":["__PHOTO_STRIPPED__"]},{"t":"6:10 PM","ic":"📷","drive_override":3,"n":"Three Sisters Viewpoint","dur":30,"c":[56.667833,-4.9866014],"info":"First dramatic viewpoint entering Glencoe from Ballachulish — the three great spurs of Beinn Fhada, Gearr Aonach, and Aonach Dubh rising directly from the valley floor. Classic pull-off with large car park. Quick stop on arrival — light will be evening warm here.","log":"A82, Ballachulish PH49 4HX\nFree parking · Large car park\nAllow 30 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJoxepRjwwiUgRXUkNlZZVyYc","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"6:30 PM","ic":"📷","n":"Glencoe Waterfall (Meeting of Three Waters)","dur":15,"drive_override":3,"c":[56.6624219,-4.9657305],"info":"Three separate streams converging in a single dramatic cascade right beside the A82. One of the most accessible and photogenic stops in Glencoe — water comes together between the flanks of the Three Sisters above. Rocky gorge and fast-moving water make it a natural 4x5 subject.","log":"A82, Ballachulish PH50 4SQ\nPark on road · Free · Walk back ~20m · Climb down under bridge for close access\nAllow 15 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJJ9HF3hkwiUgRTgQJFo3T85w","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"6:45 PM","ic":"📷","drive_override":8,"n":"Glencoe Viewpoint","dur":30,"c":[56.661528,-4.9174463],"info":"Classic elevated view over Loch Achtriochtan and the Three Sisters of Glencoe. Scout your positions here for tomorrow's full day — note light direction, foreground options, and tripod placements. Good warm-up stop before River Coupall.","log":"A82, Ballachulish PH50 4SF\nFree parking · Open 24 hours\nAllow 1 hour","map":"https://maps.google.com/maps/place/?q=place_id:ChIJizGz8JkviUgR_-1UzDdGTp0"},{"t":"7:15 PM","imgs":["__PHOTO_STRIPPED__"],"ic":"📷","drive_override":5,"n":"⚠️ Buachaille Etive Mòr — River Coupall ⭐","c":[56.647682117843026,-4.866126563311002],"info":"The defining image of the Scottish Highlands. A near-perfect volcanic pyramid rising 1022m directly from the flat moor with no foothills. River Coupall flows across the moor in front, boulders mid-stream, open sky above. Tonight: scout your exact sunrise position first — tripod placement, reflection pool, boulder cluster — then shoot as light warms toward golden hour. The west face lights orange-red in the last hour before sunset.\n\n⚠️ Lagangarbh Hut (Wee White House) — the iconic white cottage at the foot of Buachaille Etive Mòr is a 5 min walk from the Altnafeadh layby, just across the footbridge over the River Coupall. Don't miss it — it's one of the most photographed buildings in Scotland and you're already here.","photo":"Shot 1 — Old A82 bridge + mountain (90mm portrait, river-left bank, red filter, 4–8 sec). Shot 2 — Boulder field in river, camera in water as low as possible (90mm, red filter, 4–8 sec blur). Shot 3 — Still reflection pool on inside bend upstream of bridge (150mm, camera at water surface, wait for complete wind lull, 2–4 sec). Shot 4 — Golden hour cascade 9pm onward: mountain face warms to orange-red, sky drops to Zone II with red filter, maximum separation. Hero shot of the evening.","log":"⚠️ PATCHY — Glencoe approach, unreliable. Download offline.\nPark: A82 layby at River Coupall bridge\nCoords: 56.6537°N, 4.9418°W\nWading required: knee-high wellies essential, camera in river for Shots 2+3\nMidges in evening calm — bring repellent\nClachaig Inn: 10min from layby","map":"https://maps.google.com/?q=River+Coupall+Buachaille+Etive+Mor+Glencoe","imgs":["__PHOTO_STRIPPED__"],"imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"The Great Herdsman of Etive is probably the most photographed mountain in Scotland. Its pyramidal summit — Stob Dearg at 1,021 metres — is part of the Glencoe Caldera, an ancient supervolcano that erupted approximately 420 million years ago. Glencoe was the first place in the world where caldera collapse was recognized in ancient volcanic rocks — pioneered by geologists Clough, Maufe, and Bailey in their landmark 1909 paper. The rock is primarily rhyolite — the same type found at Yellowstone's supervolcano. During peak glaciation 20,000 years ago, Rannoch Moor was buried under approximately one kilometer of ice.\n\nThe mountain has a sobering casualty record — up to 13 deaths in a single year. The Curved Ridge, first ascended in April 1898, is one of Scotland's most famous scrambling routes. Climber Dougal Haston — who later summited Everest in 1975 before dying in an avalanche at 36 — reportedly redecorated the interior of nearby Lagangarbh Hut in the style of Jackson Pollock, enraging the Scottish Mountaineering Club authorities.\n\nThe Glen Etive road became \"The Skyfall Road\" after Bond (Daniel Craig) and M (Judi Dench) drove the Aston Martin DB5 through it in Skyfall (2012). The connection runs deeper than fiction: Ian Fleming's family actually owned the Dalness Estate in Glen Etive. In You Only Live Twice, Fleming gave Bond a Scots backstory with his father hailing from Glencoe."},{"t":"8:20 PM","ic":"📷","drive_override":20,"n":"Skyfall Waterfall","dur":30,"c":[56.6190879,-4.9371019],"info":"The waterfall featured in the James Bond film Skyfall (2012) driving sequence down the Glen Etive road. Dramatic multi-tiered falls with Buachaille Etive Mòr visible in the background. One of the finest waterfall photography locations in the Highlands — remote, uncrowded, and exceptional.","log":"Glen Etive Road, Ballachulish PH49 4JA\nFree parking nearby\nAllow 30 min\n⚠️ Single track road — allow time for passing","map":"https://maps.google.com/maps/place/?q=place_id:ChIJIVLFfF8liUgRXEyL2BWiM2I","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"9:35 PM","ic":"🏨","drive_override":25,"n":"Check In — Clachaig Inn","c":[56.66453841630906,-5.056608213490172],"info":"Historic climbers' inn deep in the Glencoe valley. 10 minutes from the River Coupall layby. Call ahead to confirm late arrival. Request packed breakfast bag tonight — you need to leave by 4:10am tomorrow morning.","log":"✅ SIGNAL OK — Clachaig Inn has WiFi\nClachaig Inn, Glencoe PH49 4HX\nConf: 6870559172 · Ref: #BB26031220300319\nPhone: +44 1855 811252\nJun 28–30 · 2 nights · 2 rooms (Twin + Double, B&B) · £780","map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"}],"sb":{"n":"Moxy Dublin City","c":[53.3444,-6.2672],"map":"https://maps.google.com/?q=Moxy+Dublin+City+Hotel"},"sa":{"n":"Clachaig Inn — Glencoe PH49 4HX","c":[56.66453841630906,-5.056608213490172],"map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"}},{"id":8,"date":"Jun 29","dow":"Mon","region":"scotland","checked":true,"title":"Full Glencoe Day","summary":"Lost Valley · Etive Mor Falls · Signal Rock · Glencoe Lochan · Loch Achtriochtan · Loch Leven · Clachaig Inn","mc":[56.66,-5.01],"mz":11,"stops":[{"n":"Wake Up","ic":"☀️","t":"7:00 AM","c":[56.66453841630906,-5.056608213490172],"map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland","info":"Starting location: Clachaig Inn — Glencoe PH49 4HX. Drive to first stop: ~5 min."},{"t":"7:30 AM","ic":"🥾","drive_override":30,"n":"📵 Lost Valley — Coire Gabhail ⭐","c":[56.6679,-4.9863],"info":"The hidden valley of Coire Gabhail — where the MacDonalds hid their rustled cattle, and where survivors of the 1692 Massacre took refuge. Completely invisible from the road. The approach descends into the River Coe gorge, crosses via metal staircase and wooden bridge, then climbs steeply through boulders and rock slabs. The valley floor opens suddenly — a flat hidden plain ringed by the Three Sisters, waterfalls dropping from the walls, enormous boulders deposited by ancient landslide.","photo":"Shot 1 — Valley entrance shoulder: as the floor opens below you, stop on the descent. 90mm landscape, red filter, wait for cloud break to send light onto the valley floor. Shot 2 — Valley floor stream to back wall, portrait (hero): get low on boulders in the stream, 90mm, red filter mandatory, 4–8 sec. Shot 3 — Large landslide boulders: find one with the back wall behind, 90mm or 150mm, geology shot. Shot 4 — Back wall waterfall: 210mm compressed, 8–15 sec, peaks frame the water above.","log":"📵 NO SIGNAL — deep Glencoe glen. Satellite device active. Download offline.\nPark: Three Sisters Car Park, A82 · Free · Arrive by 7:15am — fills fast in summer\nCoords: 56.6679°N, 4.9863°W\nDistance: 4km out and back · 375m elevation gain · 2–2.5hrs\nScrambling + river crossing — proper boots essential · trekking poles useful\n🦟 Midges in sheltered valley — repellent accessible, not buried in pack","map":"https://maps.google.com/?q=Lost+Valley+Coire+Gabhail+Glencoe","alltrails":"https://www.alltrails.com/trail/scotland/highlands/lost-valley-coire-gabhail?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"Coire Gabhail — \"Corrie of the Bounty\" — is a hanging valley concealed behind a massive ancient landslip, invisible from the glen below. The MacDonalds hid stolen cattle here from rival clans — particularly the Campbells — for generations. On the night of 13 February 1692, it became a refuge for survivors of the worst act of treachery in Highland history.\n\nThe political background: after William of Orange deposed the Catholic King James VII in 1688, all Highland chiefs were required to swear allegiance by 1 January 1692. Chief Alasdair MacIain arrived at Fort William on 30 December but was told he must travel to Inveraray — 60 miles through a winter storm. He arrived and swore on 6 January, six days late. John Dalrymple, Lord Stair, seized the opportunity — his letters reveal the decision predated the deadline: \"the clan Donell must be rooted out.\" On 1 February, 120 soldiers under Captain Robert Campbell of Glenlyon arrived requesting \"free quarter.\" Campbell's own niece was married to one of MacIain's sons. For twelve days, soldiers ate, drank, and played cards with their hosts. Only 13 of the 120 were actually Campbells.\n\nAt 5:00 AM on 13 February, the killing began simultaneously in three settlements. MacIain was shot rising from bed. His wife had her rings bitten from her fingers. Thirty-eight MacDonalds were killed; approximately forty more died of exposure fleeing into a blizzard. Those who reached the Lost Valley survived. In August 2023, archaeology student Lucy Ankers discovered a hoard of 36 coins buried under a hearthstone in MacIain's Summerhouse — silver coins of Louis XIV, Elizabeth I, and Charles I, none minted after the 1680s. The owner never returned for them. George R.R. Martin explicitly cited the Glencoe Massacre as a primary inspiration for the Red Wedding in Game of Thrones."},{"t":"10:15 AM","ic":"📷","drive_override":10,"n":"⚠️ Etive Mor Waterfall — Buachaille South Face","c":[56.647682117843026,-4.866126563311002],"info":"Turn south on Glen Etive road at the A82 junction — same junction as the Skyfall car chase. Drive 1 mile in, park left after a small dip. The waterfall drops directly in front of you with Buachaille Etive Mòr's south face rising behind it. Completely different angle on the Buachaille from the River Coupall shots — looking up from the south rather than the east. The pyramid reads more muscular from here. The waterfall provides a foreground element the River Coupall position doesn't have.","photo":"Shot 1 — Wide cascade, portrait, mountain centered: 90mm, red filter, 8–15 sec to silk the water, mountain centered above the falls. Shot 2 — Tighter framing, cloud-dependent: 150mm, if cloud wraps the summit switch to this — cascade as dominant bright element against dark everything, 15–30 sec. Shot 3 — Tree as compositional anchor: step left, birch tree against left edge of mountain, 90mm, red filter, dark tree mass frames mountain from left while cascade leads from bottom right.","log":"⚠️ PATCHY — Glencoe approach, unreliable. Download offline.\nTurn south on Glen Etive road at A82 junction (signed)\nDrive 1 mile — park left after small dip in road · informal layby\n1 minute walk to falls · Free · No permit\nAllow 45 minutes\nOvercast actively helps — more cloud = longer exposure = more water silk","map":"https://maps.google.com/?q=Etive+Mor+Waterfall+Glen+Etive+Glencoe","artist":"4x5 B\u0026W Waterfall \u2014 Field Notes\n\nGEAR\nAperture: f/22 default (f/16 for maximum sharpness) \u00b7 Never f/32+\nFilters: 6\u201310 stop ND for sun \u00b7 Overcast = likely no ND needed\nEssential: tripod, cable release, reciprocity app\n\nTWO SHOT TYPES\nWide Hero (135mm) \u2014 full fall top to bottom, rocky foreground, stream for depth, dark foliage framing. Target: 5\u20138 sec actual.\nTight Gorge Detail (300mm) \u2014 isolate water threading between boulders, very high contrast, deep blacks. Target: 10\u201315 sec actual.\n\nEXPOSURE WORKFLOW\n1. Pick motion target first (creative decision):\n   Ribbons, flow visible: 1\u20134 sec \u00b7 Silky smooth: 4\u20138 sec \u00b7 Fully ethereal: 15+ sec\n2. Read water volume:\n   High volume (e.g. Assaranca): pre-reciprocity 2\u20133 sec \u2192 actual ~5\u20138 sec\n   Medium gorge fall: pre-reciprocity 4\u20136 sec \u2192 actual ~8\u201315 sec\n   Low volume trickle: pre-reciprocity 6\u201310 sec \u2192 actual ~15\u201325 sec\n3. Apply reciprocity correction (use app) \u2014 adds 1.5\u20132x at 2\u20136 sec range\n4. Shoot. Default: 10 sec actual works for most overcast/medium-volume falls.\n\nZONE SYSTEM\nSilky water (main falls): Zone VII\u2013VIII\nForeground stream/ribbons: Zone VI\u2013VII\nWet dark rocks: Zone II\u2013III \u00b7 Dry rock: Zone III\u2013IV\nDark foliage/gorge walls: Zone I\u2013II \u00b7 Overcast sky: Zone V\u2013VI","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"The River Etive flows peat-dark from Rannoch Moor, its amber color from decomposed vegetation accumulated over thousands of years. The glen's mythology predates the Fianna legends. In the Ulster Cycle, Deirdre and Naoise — Ireland's great tragic lovers — fled King Conchobhar's court and settled here. Deirdre's lament is preserved in the Glen Massan Manuscript (c.1238): \"Glen Etive, O Glen Etive / There I raised my earliest house / Beautiful its woods on rising / When the sun fell on Glen Etive.\" Place names still preserve the legend: Dun MhicUisneachan, Coille Naoise, and \"Deirdre's Drawing Room.\"\n\nScottish folklore assigns the glen its own monster: the Fachan (Direach Ghlinn Eitidh), described as having a single eye, a single hand protruding from its chest, and a single leg. The film location list is extraordinary: Harry Potter and the Deathly Hallows (lakeside camping scenes and dragon escape into Loch Etive), Braveheart, Thor: The Dark World, and Skyfall.\n\nThe glen has suffered from its Skyfall fame. Irresponsible car camping after the 2012 release turned sections into what Highland Councillor Andrew Baxter called \"Glen Midden.\" The Etive Mòr Waterfall viewpoint's pristine heather has been trampled by photographer footfall into \"a waterlogged, churned-up wasteland\" — a cautionary tale for any visit here."},{"t":"11:15 AM","ic":"📷","drive_override":5,"n":"Glen Etive Waterfall View Point","c":[56.6252463,-4.9065354],"info":"Small but photogenic waterfall just off the Glen Etive road. Quick stop on the way to Skyfall Waterfall — good warm-up composition before the bigger falls further down.","log":"Glen Etive Road, Ballachulish PH49 4HZ\nSmall pull-off · Free\nAllow 20 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJF14zUh0liUgRYO5ggjKqc0A"},{"t":"1:00 PM","ic":"🍳","drive_override":25,"n":"✅ Breakfast + Rest — Clachaig Inn","c":[56.66453841630906,-5.056608213490172],"info":"Back to Clachaig for a proper breakfast. You've done Lost Valley and the waterfall — the rest of the day is easy walking and roadside. Rest your legs.","log":"✅ SIGNAL OK — Clachaig Inn has WiFi\nClachaig Inn · Breakfast included with room\nFood served from morning · Boots Bar open\nAllow 45–60 minutes","map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"},{"t":"2:30 PM","ic":"🌲","drive_override":5,"n":"✅ Signal Rock + Clachaig Falls","c":[56.66203,-5.05597],"info":"Two locations in one walk from the Clachaig car park. Signal Rock is the forested ridge where the signal fire was lit to begin the 1692 Massacre of Glencoe — mossy woodland, birch and oak canopy, dark ancient character. Clachaig Falls on the River Coe is the photography payoff — a wide cascade and tiered gorge falls, intimate and enclosed, completely different from the grand valley shots all day.","photo":"Shot 1 — Wide cascade, landscape: back from the falls, elevated slightly, 90mm, red filter, 4–8 sec. Shows full width and valley context. Shot 2 — Two-tier portrait, camera at pool level (hero): get low at base of lower falls, portrait, 90mm, red filter, 8–15 sec to silk both tiers simultaneously. Mountain and cloud fill the background. Shot 3 — High water drama, conditions dependent: close rock position, wide and low, red filter, 4–8 sec — retain some movement energy in the churn.","log":"✅ SIGNAL OK — Clachaig Inn has WiFi\nStart: Clachaig Inn car park — walk out the door\nSignal Rock circular trail: ~2km · 30–45 min · flat woodland path\nClachaig Falls: on same route just below bridge near inn\nFree · No permit · Boots recommended — path muddy","map":"https://maps.google.com/maps/place/?q=place_id:ChIJc8GkqH8xiUgRNRga4c0ObgE","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"Popular legend holds that a signal fire was lit on this boulder at 5:00 AM on 13 February 1692 to begin the Glencoe Massacre. The National Trust for Scotland now disputes this: no evidence supports the story. More likely, the rock — whose original Gaelic name Tom a' Ghrianain means \"Knoll of the Sun\" — served as a traditional gathering place for the MacDonalds, possibly with pre-Christian druidic associations connected to sun worship.\n\nThe nearby Clachaig Inn — dating to the 16th century, with over 365 malt whiskies — displays a sign reading \"No hawkers or Campbells,\" a wry reference to the massacre that still resonates 334 years later. The NTS Visitor Centre features a 10-minute film narrated by Rory McCann, who played The Hound in Game of Thrones — a fitting choice given that George R.R. Martin cited the Glencoe Massacre as a primary inspiration for the Red Wedding.\n\nHagrid's Hut from the Harry Potter films (Prisoner of Azkaban) was built on slopes above Torren Lochan, very near the Clachaig Inn. The cliffs opposite were used as Hogwarts exterior shots. The Pass of Glencoe and Clachaig Gully were also filming locations for Monty Python and the Holy Grail."},{"t":"4:00 PM","ic":"📷","drive_override":5,"n":"⚠️ Glencoe Lochan","c":[56.687642999999994,-5.096785199999999],"info":"A hidden lochan enclosed by North American woodland — birch, pine and spruce transplanted from Canada in the 1890s by Lord Strathcona for his homesick Canadian wife. Feels nothing like the open Highland valley 500 metres away. Still water, mountain glimpsed through the trees, forest silence. The intimate counterpoint to every grand landscape shot today.","photo":"Shot 1 — South shore, Pap of Glencoe centered (hero): 150mm, red filter, camera at water edge, mountain framed between tree masses, wait for complete stillness, 2–4 sec. Shot 2 — East shore, tree reflection dominant: 150mm or 210mm, red filter, dark conifer spires centered against pale deciduous flanking trees, portrait orientation, near-symmetrical reflection. Shot 3 — Intimate woodland edge: step back into treeline, 90mm, birch trunks as foreground verticals, lochan glimpsed behind, forest floor texture.","log":"⚠️ PATCHY — Glencoe village fringe, patchy\nGlencoe Lochan car park — off minor road north of Glencoe village\nFree · 2.3m height limit on car park entrance\n20–30 min loop walk · completely flat · accessible at all hours\n🦟 Midges likely in sheltered woodland — repellent","map":"https://maps.google.com/maps/place/?q=place_id:ChIJRxYigNQ2iUgRARAC22_2EZI","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"Donald Alexander Smith (1820–1914) rose from a £20-per-year Hudson's Bay Company apprentice to become one of the wealthiest men in the British Empire. His defining moment came at 9:22 AM on 7 November 1885, when he drove the last spike of the Canadian Pacific Railway at Craigellachie, British Columbia — one of the most iconic photographs in Canadian history. His first swing bent the iron spike so badly it had to be replaced; the bent original was fashioned into decorative pins mounted with 13 diamonds for officials' wives.\n\nHis wife Isabella Sophia Hardisty was of Indigenous and Scottish heritage. She was privately called \"our lady of the snows\" by English aristocrats who accepted her hospitality. Created 1st Baron Strathcona and Mount Royal in 1897, Smith originally wanted the title \"Lord Glencoe\" — but was advised against it because of the massacre associations. \"Strathcona\" is described as a Gaelic version of Glencoe.\n\nAfter acquiring the Glencoe Estate in 1895, Strathcona created this artificial lochan and surrounded it with North American conifers — Western hemlock, Douglas fir, Sitka spruce, Western red cedar, and even towering redwoods — to ease Isabella's homesickness for Canada. Despite this extraordinary gesture, Isabella reportedly never fully took to Glencoe and remained homesick. She died in London in November 1913. Donald died just ten weeks later, suggesting a bond that had survived five marriage ceremonies (repeated due to concerns about the legality of each previous one).\n\nPop culture: Donald Smith's driving of the last spike of the Canadian Pacific Railway was recreated in the 1974 CBC mini-series The National Dream, based on Pierre Berton's bestselling two-volume history — one of the most watched Canadian television productions ever made. The bent spike from Smith's first failed swing was later used in Gordon Lightfoot's concept for his 1967 song \"Canadian Railroad Trilogy,\" one of Canada's most beloved folk songs, which begins: \"There was a time in this fair land when the railroad did not run.\" Smith himself appears as a character in numerous Canadian historical novels. The Canadian Pacific Railway — whose construction Smith helped finance — became the subject of the acclaimed 2014 documentary The Last Spike. Glencoe's Canadian woodland is today one of Scotland's most unusual ecological anomalies: Pacific Coast trees thriving in a Highland glen, their root systems adapted to Himalayan-scale rainfall, blissfully unaware they are 4,000 miles from home."},{"t":"5:30 PM","ic":"📷","drive_override":5,"n":"📵 Loch Achtriochtan + Achnambeith Cottage ⭐","c":[56.664481699999996,-5.0388193],"info":"A small loch on the valley floor ringed by the steepest walls in Glencoe — Aonach Eagach to the north, Three Sisters to the south. On a still afternoon both ridges reflect simultaneously. Achnambeith — the white farmhouse at the base of the Three Sisters, visible from the loch shore — is a distinct and equally strong subject. Tiny white cottage dwarfed by mountain walls with a waterfall thread above it. Do not approach the building — it is a private residence. Shoot from the loch shore and valley floor.","photo":"Shot 1 — Wide valley reflection looking east: 90mm landscape, camera at loch edge, reed grasses foreground, cloud reflection hero if sky is dramatic, red filter. Shot 2 — Cottage + bare tree reflection, loch level (hero): 150mm, camera extremely low at water edge, tree right foreground, white cottage centered reflected, red filter, wait for complete stillness. Shot 3 — Cottage with gravel track, full mountain wall: 150mm or 210mm from valley floor, track as leading line, full Three Sisters behind, red filter — works in any light. Shot 4 — Golden hillside, cottage at base: 210mm, western light warming south face, cottage as anchor at base of glowing slope, red filter.","log":"📵 NO SIGNAL — deep in Glencoe pass. Satellite device active.\nPark: A82 layby just west of the loch\nCoords: 56.6720°N, 5.0310°W\nRoadside — 2 min walk to loch shore\nReflection dependent on wind stillness — patience required","map":"https://maps.google.com/maps/place/?q=place_id:ChIJsycMq6sxiUgRZ8_0vXQivEQ","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"The small loch's historical name — Loch Trychardan, \"Loch of the Three Friends\" — likely refers to three MacDonald settlements along its shore, all destroyed in the 1692 massacre. NTS excavations (2018–2024) uncovered remains of the township including houses, barns, and a grain-drying kiln, with evidence that MacDonalds returned after the massacre before being driven out by 19th-century sheep farming. At nearby Achnacon in 2024, archaeologists discovered a bent plaid pin, musket ball fragments, and 17th-century bronze coins — possibly from a gambling session interrupted by the massacre.\n\nAchnambeith Cottage (c.1900) is a private residence. The glen is reputedly haunted. On the anniversary of the massacre, people claim to glimpse ghostly shadows of fugitive clansmen. Most compelling is the legend of Corrag, the Witch of Glencoe, who allegedly foretold the massacre but was ignored. After the killings, she cast MacIain's broadsword into Loch Leven, saying: \"So long as this sword lays undisturbed by man, no man from this Glen will die by the sword again.\" In June 1916, a dredger raised the sword. The following day — 1 July 1916, the first day of the Battle of the Somme — seven men from Glencoe died, the first from the glen to die in battle since the massacre.\n\nThe Nine of Diamonds playing card is called the \"Curse of Scotland\" — massacre orders were reputedly written on one.\n\nPop culture: Glencoe valley is one of the most filmed landscapes in Scotland. The Starz series Outlander (2014–2023) used Glencoe extensively throughout its eight seasons — the valley's visual character is inseparable from the show's Jacobite aesthetic, and the Glencoe Massacre itself features in Season 2. Highlander (1986), starring Christopher Lambert and Sean Connery, filmed key scenes on the Glencoe valley road and the surrounding peaks — the film's immortal Scottish warrior aesthetic was largely built on this landscape. Rob Roy (1995), with Liam Neeson and Jessica Lange, filmed numerous battle and chase sequences in the glen. The 1692 massacre itself was depicted in the 1971 BBC drama Massacre at Glen Coe and the 2008 National Theatre of Scotland production The Strange Undoing of Prudencia Hart. The valley also appears briefly in Steven Spielberg's Schindler's List (1993), in a scene depicting a train journey through Highland Scotland."},{"t":"7:00 PM","ic":"📷","drive_override":12,"n":"⚠️ Loch Leven — Pap of Glencoe","c":[56.681646199999996,-5.1059081],"info":"At the western end of the Glencoe valley the mountains open onto the tidal sea loch of Loch Leven. The Pap of Glencoe — a distinctive conical peak — rises above the south shore. Tidal foreground changes through the day. The north shore B863 road offers a hidden bay layby with moored boats and complete quiet. Western sun at this hour sidelights the Pap's conical form. In B&W the bare rock geology reads as distinct ridgelines and gullies against a near-black sky with red filter — more graphically powerful than snow.","photo":"Shot 1 — Environmental, north shore: 90mm landscape, foreground vegetation, full loch width, Pap centered, red filter, get low to avoid power lines. Shot 2 — Mirror reflection, water level (hero): 210mm, camera at water surface, mountain above and below, razor-thin south shore horizon between, red filter, wait for complete stillness. Shot 3 — Hidden bay boats: 90mm or 150mm, moored boats as foreground, Pap behind, intimate local character.","log":"⚠️ PATCHY — edge of Ballachulish, patchy\nFrom Loch Achtriochtan: 10min west on A82 through Glencoe village\nCross Ballachulish bridge → right onto B863 north shore road\nLayby with stone wall ~1 mile along B863 — gate leads to hidden bay\nAlso shootable from A82 roadside just west of Glencoe village\nFree · Roadside access · Allow 45 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJC7u-Ci43iUgRCJpKA0VYzns","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"Sgorr na Cìche — \"Peak of the Breast\" — towers 742 metres above Glencoe village. Nearby Sgòrr nam Fiannaidh (\"Peak of the Fingallian Warriors\") is named for Fionn Mac Cumhaill's warriors, who legendarily charged down the hillside to drive Viking invaders from Loch Leven.\n\nThe Ballachulish Slate Quarry began operations in 1693 — one year after the massacre — when travelling quarriers spotted slate and started digging. By the mid-1800s, annual output reached 26 million slates, and Ballachulish produced more than half of all domestic slates quarried in Scotland. The quarry closed in 1955; blue pools now fill the old workings.\n\nOn 14 May 1752, government factor Colin Roy Campbell of Glenure (\"The Red Fox\") was shot in the back by a concealed marksman. James Stewart of the Glens was arrested despite a solid alibi, tried before a jury of 11 Campbells at Inveraray Castle — presided over by the victim's brother — and hanged on 8 November 1752. His body, wrapped in chains, was left hanging for over three years as a warning. A 2013 Royal Society of Edinburgh re-examination using forensic ballistics determined Campbell was likely killed by two unknown gunmen, undermining the entire original conviction. Robert Louis Stevenson wove the case into Kidnapped (1886).\n\nPerhaps most extraordinary: in November 1880, builders discovered a nearly life-size carved wooden figure — 145 centimeters tall, carved from alder, with quartzite pebbles for eyes. Radiocarbon dated to 728–524 BC, the Ballachulish Goddess is the oldest human figure found in Scotland — over 2,500 years old. She may represent the Celtic hag goddess Cailleach Bheithir. Railway workers were reportedly reluctant to handle the \"Pagan Idol\" during transport to Edinburgh, where she now resides in the National Museum of Scotland.\n\nPop culture: Robert Louis Stevenson's Kidnapped (1886) — inspired by the Appin Murder and set partly on Loch Leven — has been adapted for screen at least eight times, including Disney's Kidnapped (1960) starring Peter Finch, a 1971 version with Michael Caine as Alan Breck Stewart, and a 2005 BBC adaptation. The Ballachulish ferry crossing that features in the novel was replaced by the Ballachulish Bridge in 1975 — the last working vehicle ferry crossing of Loch Leven. Stevenson called the Appin Murder \"the causeless, fruitless, and disastrous crime\" in a letter, yet it gave him one of Scottish literature's great adventure novels. The broader Glencoe area appears in Mel Gibson's Braveheart (1995) — several Battle of Stirling sequences were filmed on the valley floor. The Pap of Glencoe's distinctive profile appears in dozens of Scottish tourism campaigns and was used by VisitScotland as their primary image for the 2009 \"Homecoming Scotland\" campaign marking the 250th anniversary of Robert Burns's birth."},{"t":"8:30 PM","ic":"🍺","drive_override":12,"n":"✅ Dinner — Clachaig Inn","c":[56.66453841630906,-5.056608213490172],"info":"Back to Clachaig. Food served until 9pm. Boots Bar has 300+ whiskies. You've earned it — Lost Valley, Etive Mor, Signal Rock, Glencoe Lochan, Loch Achtriochtan, Loch Leven. Six stops, one full Highland day.","log":"✅ SIGNAL OK — Clachaig Inn has WiFi\nClachaig Inn · Food served noon–9pm\nBoots Bar · 300+ malts\nCheck out tomorrow: 8:30–10:30am","map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"}],"sb":{"n":"Clachaig Inn — Glencoe PH49 4HX","c":[56.66453841630906,-5.056608213490172],"map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"},"sa":{"n":"Clachaig Inn — Glencoe PH49 4HX","c":[56.66453841630906,-5.056608213490172],"map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"}},{"id":9,"date":"Jun 30","dow":"Tue","region":"scotland","checked":true,"title":"Glencoe → Eilean Donan → Skye","summary":"Check out Clachaig · Five Sisters of Kintail · Eilean Donan Castle · Skye Bridge · Sligachan Old Bridge · Oor Neuk","mc":[57.2,-5.6],"mz":9,"stops":[{"n":"Wake Up","ic":"☀️","t":"8:05 AM","c":[56.66453841630906,-5.056608213490172],"map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe","info":"Starting location: Clachaig Inn — Glencoe. Drive to first stop: ~5 min."},{"t":"8:30 AM","ic":"🏨","n":"Check Out — Clachaig Inn","c":[56.66453841630906,-5.056608213490172],"info":"Check out between 8:30–10:30am. Load the car, fuel up at Ballachulish before heading north. Route: A82 north through Fort William, then A87 west toward Kyle of Lochalsh and the Skye bridge.","log":"✅ SIGNAL OK — Clachaig Inn has WiFi\nClachaig Inn, Glencoe PH49 4HX\nCheck-out: 8:30–10:30am\nFuel: Ballachulish petrol station before heading north\nRoute: A82 north → Fort William → A87 west → Kyle of Lochalsh → Skye Bridge → A87/A850 to Sligachan → A855 to Staffin\nTotal drive: ~3hrs 30min without stops","map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe+Scotland"},{"t":"~11:00 AM","ic":"📷","n":"📵 Five Sisters of Kintail — Glen Shiel Layby","c":[57.1695791,-5.2946737],"info":"Roadside pull-off directly below the Five Sisters on the A87. The full ridge rises steeply above you — dramatic close-up angle shooting upward at the five distinct peaks. Park at the Glen Shiel car park (free) and shoot from the road. Battle of Glen Shiel information board on site.","log":"A87, Kyle IV40 8HU\nGlen Shiel Car Park · Free\nAllow 20 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJaf_JM80nj0gRG6crgY_2o3w"},{"t":"~11:30 AM","ic":"📷","n":"📵 Ratagan Pass — Five Sisters Panorama","dur":30,"drive_override":15,"c":[57.22345417088871,-5.463673797598242],"info":"The definitive Five Sisters postcard shot. A short detour off the A87 at Shiel Bridge up a single-track road to a car park at the Bealach Ratagan. All five peaks lined up across Loch Duich — the full ridge reflected in the water with distance and scale impossible to achieve from the valley floor.","log":"Detour: turn south at Shiel Bridge off A87\nSingle track road · Car park 3/4 up the pass · Free\nAllow 30 min including drive","map":"https://maps.google.com/?q=57.22345417088871,-5.463673797598242"},{"t":"~1:00 PM","ic":"📷","n":"✅ Eilean Donan Castle + Loch Duich ⭐","c":[57.2742,-5.5155],"info":"Scotland's most photographed castle on a small tidal island where three sea lochs meet — Loch Duich, Loch Long, and Loch Alsh. The three-arched bridge connects the island to the shore. Arriving around 1pm gives good midday light on the castle face. Three shooting positions: front rocky shore with castle centered, low angle on the seaweed and tidal rock, and the bridge-led reflection from the east bank. Also turn 180 degrees — looking east down Loch Duich with the Five Sisters visible in the far distance is a distinct and equally strong composition.","photo":"Shot 1 — Front position, rocks foreground, castle centered, 150mm, red filter, dramatic sky if present. Shot 2 — Low on the seaweed, 90mm wide, tidal texture as Zone II-III foreground. Shot 3 — East bank bridge-led reflection, 90mm or 150mm, wait for still water. Shot 4 — Turn 180°, 210mm east down Loch Duich, Five Sisters compressed in the far distance.","log":"✅ SIGNAL OK — Dornie village, reasonable coverage\nA87 road through Dornie village · Right on the road, signed\nFree parking on both sides of the road\nAllow 45–60 min · Tide dependent for foreground\nDistance from Glen Shiel: ~25min","map":"https://maps.google.com/?q=Eilean+Donan+Castle+Dornie+Scotland","hist":"Originally a 13th-century fortification built by Alexander III of Scotland to defend against Viking raids. The MacRae clan — hereditary constables — called themselves 'MacKenzie's shirt of mail' because they so often stood between their chiefs and enemy blades in battle. In 1719 the castle was garrisoned by 40 Spanish soldiers as the Jacobite supply base — the same rising fought at Glen Shiel an hour's drive east. A British naval squadron entered Loch Alsh on 10 May, bombarded the castle with three frigates for several hours, then blew it up with 27 barrels of gunpowder. It lay in complete ruin for nearly 200 years.\n\nLt Colonel John MacRae-Gilstrap began rebuilding in 1912, guided in part by a dream his wife had about the castle's original interior layout. Reconstruction took 20 years and £250,000 — equivalent to over £15 million today. 200,000 tons of material were moved.\n\nIt is now the most photographed castle in Scotland and one of the most filmed in the world. Pop culture appearances: Highlander (1986) with Christopher Lambert and Sean Connery, The World Is Not Enough (1999) with Pierce Brosnan as James Bond, Elizabeth: The Golden Age (2007) with Cate Blanchett, Brave (2012) by Pixar/Disney, and dozens of commercials and album covers. It appears on more Scottish shortbread tins than any other image in existence. The castle was voted Scotland's most popular landmark in a 2011 poll.","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"~2:30 PM","ic":"🌉","n":"✅ Skye Bridge — Cross to the Island","c":[57.2716,-5.7279],"info":"The Skye Bridge opened in 1995, replacing the last working vehicle ferry. When it opened it was the longest concrete bridge in Scotland. Toll was abolished in 2004 after years of protest — campaigners, inspired by the ancient Scottish tradition of free passage, refused to pay and accepted fines instead. The first mainland-to-Skye fixed link in history.","log":"✅ SIGNAL OK — Kyle of Lochalsh, good coverage\nA87 · No toll · Open 24hrs\nKyle of Lochalsh → Kyleakin, Skye\nDistance from Eilean Donan: ~20min","map":"https://maps.google.com/?q=Skye+Bridge+Kyle+of+Lochalsh"},{"t":"~3:30 PM","ic":"📷","n":"⚠️ Sligachan Old Bridge — Cuillin Ridge","c":[57.29044,-6.17105],"info":"18th century three-arched stone bridge at the crossroads of Skye. The Black Cuillin Ridge rises directly behind it — 11 Munros, the most technically demanding mountain ridge in Britain. The river runs peat-dark from the moorland above. Three distinct shooting positions covering the front-on arch composition, low long-exposure river foreground, and the side angle through the arches.","photo":"Shot 1 — Front-on from downstream, camera low in the river, 90mm, red filter, 4–8 sec to silk the water. Cuillin fills the upper frame. Shot 2 — Same position lower and further back, more river, bridge smaller. Shot 3 — Side angle from south bank through the arches, 150mm, Red Cuillin and Glamaig visible behind.","log":"⚠️ PATCHY — hotel has WiFi, outdoor signal unreliable\nA87/A863 junction, Sligachan · Large free car park at Sligachan Hotel\nCamera in the river — wellies essential\nAllow 30–40 minutes\nOor Neuk: ~25min north on A87/A855","map":"https://maps.google.com/?q=Sligachan+Old+Bridge+Isle+of+Skye","hist":"The Sligachan Hotel beside the bridge opened in 1830 and became the base for the first serious attempts to climb the Black Cuillin — the most technically demanding mountain ridge in Britain. Norman Collie, one of the great Victorian alpinists who made first ascents in the Himalayas and Canadian Rockies, spent 40 summers at Sligachan. After his death in 1942 he was buried here as he requested — his ghost is said to wander the glen on winter nights.\n\nThe fairy legend: washing your face in the river water here grants eternal youth and beauty — provided you submerge your face for seven seconds without breathing. Local tradition held this was how the fairy folk maintained their ageless appearance.\n\nThe name Sligachan means 'place of shells' in Gaelic. The crossroads here is the geographic heart of Skye — every road on the island eventually passes through it. Outlander used the surrounding glen extensively. The Cuillin Ridge rising above the bridge was described by mountaineer W.H. Murray as 'the only genuine mountaineering country in Britain' — it remains unclimbed by many experienced alpinists.","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"~4:30 PM","ic":"🏨","n":"Check In — Oor Neuk","c":[57.45709,-6.29806],"info":"Whole house rental near Tole, Staffin, on the northeast coast of Skye. Base for three nights. Check in from 4pm. Unload, settle in, early dinner. Tomorrow is a 4am alarm for the Old Man of Storr sunrise.","log":"Oor Neuk, Tole, Staffin, Isle of Skye\nCheck-in: from 4:00pm · Check-out: 10:00am Jul 3\n3 nights · Whole house\n⚠️ Load film holders tonight\n⚠️ Set THREE alarms: 3:30am wake · Out by 3:50am · Old Man car park 4:05am · Sunrise 4:28am","map":"https://maps.google.com/?q=Staffin+Isle+of+Skye"},{"t":"~6:00 PM","ic":"🦕","n":"Staffin Harbour — Dinosaur Footprints","dur":60,"drive_override":30,"c":[57.63313,-6.19815],"info":"Jurassic-era dinosaur footprints preserved in the tidal rock platform at Staffin — one of the few accessible dinosaur trackways in Scotland. Best viewed at low tide. Look for sauropod and theropod prints in the layered limestone slabs near the harbour. Staffin Dinosaur Museum nearby if open.","log":"Staffin Harbour Car Park · Free\n57.63313°N, 6.19815°W\nCheck tide tables for Jun 28 — best at low or mid tide\nAllow 1 hour","map":"https://maps.google.com/?q=57.63313,-6.19815"}],"sb":{"n":"Clachaig Inn — Glencoe","c":[56.66453841630906,-5.056608213490172],"map":"https://maps.google.com/?q=Clachaig+Inn+Glencoe"},"sa":{"n":"Oor Neuk — Tole, Staffin, Skye","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Staffin+Isle+of+Skye"}},{"id":10,"date":"Jul 1","dow":"Wed","region":"scotland","checked":true,"title":"Trotternish Peninsula — Storr to Neist","summary":"Old Man of Storr · Brothers Point · Kilt Rock · Neist Point","mc":[57.53,-6.35],"mz":10,"stops":[{"n":"Wake Up","ic":"☀️","t":"6:00 AM","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Staffin+Isle+of+Skye","info":"Starting location: Oor Neuk — Tole, Staffin. Drive to first stop: ~21 min."},{"t":"7:00 AM","ic":"🥾","n":"⚠️ Old Man of Storr ⭐","dur":240,"c":[57.49933,-6.15843],"info":"The most iconic photography location on Skye. A 55-metre basalt pinnacle rising from a massive ancient landslip on the Trotternish Ridge. Three shooting positions: elevated northwest viewpoint above the pinnacles (requires extra 15–20 min beyond the main path), close position among the pinnacles looking up, and the standard path viewpoint with the Sound of Raasay stretching left. The June green grass separates beautifully from the dark basalt with red filter.","photo":"Shot 1 — Elevated northwest position, 90mm landscape, Old Man upper right, Loch Fada and Sound of Raasay below, red filter. Shot 2 — Close among the pinnacles, 90mm portrait, looking up at the Old Man against sky, red filter. Shot 3 — Standard path viewpoint, 150mm, classic profile with sea stretching left, red filter.","log":"⚠️ PATCHY — Trotternish, weak signal. Download offline.\nA855 Storr car park · Free · Large car park fills by 9am in peak season\nDepart Oor Neuk 7:30am · Car park 7:45am · Shooting 8:25–10:00am\n40 min uphill on well-maintained steep path · No scrambling\n4x5 kit in padded backpack · Allow 90 min on hill","map":"https://maps.google.com/?q=Old+Man+of+Storr+Isle+of+Skye","alltrails":"https://www.alltrails.com/trail/scotland/highlands/the-old-man-of-storr-circular-walk?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality","hist":"The 55-metre pinnacle formed from a massive landslip 10,000–15,000 years ago when retreating glaciers destabilized the thick basalt above weaker Jurassic sedimentary rock — the entire slope is still slowly moving. The Old Man was first climbed in 1955 by Don Whillans — the rock is so unstable it has been repeated only a handful of times since, described as 'climbing lumps of coal.' In Old Norse, Storr means 'Great Man.' The pinnacle was used as a navigation marker by Viking seafarers. Legend holds it is the exposed thumb of a giant buried in the ridge, waiting to rise again. The Norse also left place names all across this peninsula — Trotternish itself is from Old Norse Þróndarnes. Ridley Scott's Prometheus (2012) filmed landscape scenes in the Storr area. The formation also appears in Snow White and the Huntsman (2012), Macbeth (2015 with Michael Fassbender), and The BFG (2016).","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"~11:20 AM","ic":"📷","n":"Brothers Point — Rubha nam Brathairean","drive_override":20,"dur":30,"c":[57.58717149999999,-6.1391009],"info":"Hidden coastal headland 1.5 miles south of Kilt Rock. Dramatically less crowded than any other Trotternish stop. Clifftop views north and south along the coast with sea stacks and crashing Atlantic. Coastal B&W work — cliff edges, breaking waves, headland geometry. Short 20-min walk from road.","log":"Roadside layby · IV51 · Free · Limited spaces\nWalk through sheep fields · Close gates\nWear waders/grip studs — can be boggy","map":"https://maps.google.com/maps/place/?q=place_id:ChIJu7pXuorRjUgR54BYadum5iQ"},{"t":"~12:00 PM","ic":"📷","n":"⚠️ Kilt Rock + Mealt Falls","drive_override":10,"dur":30,"c":[57.609462799999996,-6.173844300000001],"info":"Roadside viewpoint platform on the A855 overlooking 90-metre columnar basalt sea cliffs whose vertical columns resemble kilt pleats, with Mealt Falls dropping 55–60 metres directly into the sea alongside. Both visible from the same platform. Photos to be added.","log":"⚠️ PATCHY — Trotternish coast, patchy\nA855 north of Staffin · Free car park at viewpoint\nRoadside — no walk required · Allow 20–30 min","map":"https://maps.google.com/maps/place/?q=place_id:ChIJbVtBWN7RjUgRdxh9-ru_92E","artist":"4x5 B\u0026W Waterfall \u2014 Field Notes\n\nGEAR\nAperture: f/22 default (f/16 for maximum sharpness) \u00b7 Never f/32+\nFilters: 6\u201310 stop ND for sun \u00b7 Overcast = likely no ND needed\nEssential: tripod, cable release, reciprocity app\n\nTWO SHOT TYPES\nWide Hero (135mm) \u2014 full fall top to bottom, rocky foreground, stream for depth, dark foliage framing. Target: 5\u20138 sec actual.\nTight Gorge Detail (300mm) \u2014 isolate water threading between boulders, very high contrast, deep blacks. Target: 10\u201315 sec actual.\n\nEXPOSURE WORKFLOW\n1. Pick motion target first (creative decision):\n   Ribbons, flow visible: 1\u20134 sec \u00b7 Silky smooth: 4\u20138 sec \u00b7 Fully ethereal: 15+ sec\n2. Read water volume:\n   High volume (e.g. Assaranca): pre-reciprocity 2\u20133 sec \u2192 actual ~5\u20138 sec\n   Medium gorge fall: pre-reciprocity 4\u20136 sec \u2192 actual ~8\u201315 sec\n   Low volume trickle: pre-reciprocity 6\u201310 sec \u2192 actual ~15\u201325 sec\n3. Apply reciprocity correction (use app) \u2014 adds 1.5\u20132x at 2\u20136 sec range\n4. Shoot. Default: 10 sec actual works for most overcast/medium-volume falls.\n\nZONE SYSTEM\nSilky water (main falls): Zone VII\u2013VIII\nForeground stream/ribbons: Zone VI\u2013VII\nWet dark rocks: Zone II\u2013III \u00b7 Dry rock: Zone III\u2013IV\nDark foliage/gorge walls: Zone I\u2013II \u00b7 Overcast sky: Zone V\u2013VI","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"The upper portion of Kilt Rock is a dolerite sill — magma that intruded along bedding planes of Jurassic sedimentary rocks approximately 60 million years ago, then cooled slowly into vertical columnar joints that resemble the pleats of a kilt. The horizontal layering of differently coloured rock creates a tartan-like pattern. Mealt Falls drops from Loch Mealt directly into the sea — on very windy days the waterfall is blown upward and never reaches the water below. The nearby coast at Rubha nam Brathairean has yielded 165-million-year-old theropod and sauropod tracks. Staffin village is Scotland's 'Dinosaur Isle.' The safety fencing at the viewpoint creates an eerie organ-like sound in strong wind as air passes through holes in the piping."},{"t":"~1:45 PM","ic":"📷","n":"📵 Neist Point ⭐","drive_override":75,"c":[57.4228,-6.7876],"info":"Westernmost point of Skye. The lighthouse sits at the end of a dramatic headland with basalt cliff faces and a 20-minute walk from the car park down to the point. Evening shoot — the lighthouse faces west into the Atlantic. On clear days the Outer Hebrides are visible across The Minch. Photos to be added.","log":"📵 NO SIGNAL — westernmost tip of Skye. Satellite device active. Download offline.\nEnd of B884 road, Glendale · Free car park\n20 min walk down to lighthouse · Allow 2 hours\n~1hr drive from Quiraing","map":"https://maps.google.com/?q=Neist+Point+Lighthouse+Skye","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"hist":"Neist Point Lighthouse was first lit on 1 November 1909, designed by David Alan Stevenson — Robert Louis Stevenson's first cousin, from the famous lighthouse-building dynasty that constructed over 150 Scottish lighthouses across four generations. Automated in 1990. The steamer Doris grounded near the point in 1909, the very year the lighthouse was commissioned. The basalt cliffs display columnar formations connected geologically to the Giant's Causeway in Northern Ireland. The legend of the Blue Men of the Minch — supernatural sea-dwellers who test ship captains with poetry challenges and seize boats from those who cannot complete the rhyme. Ale was traditionally poured into the sea as a peace offering. The waters below are among Skye's best for minke whales, porpoises, dolphins, and occasionally orcas. Film: Lars von Trier's Breaking the Waves (1996), 47 Ronin (2013)."},{"t":"~9:30 PM","ic":"🏠","n":"Return — Oor Neuk","c":[57.45709,-6.29806],"info":"Return to Oor Neuk. ~1hr drive from Neist Point. Load film holders for Day 11.","log":"B884 back to A863 → A87 → A850 → A855 to Staffin\n~1hr drive · Load film holders tonight\nDay 11 depart 8:00am — Fairy Pools, Talisker Bay, Elgol","map":"https://maps.google.com/?q=Staffin+Isle+of+Skye"}],"sb":{"n":"Oor Neuk — Tole, Staffin","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Staffin+Isle+of+Skye"},"sa":{"n":"Oor Neuk — Tole, Staffin","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Staffin+Isle+of+Skye"}},{"id":11,"date":"Jul 2","dow":"Thu","region":"scotland","checked":true,"title":"Skye South","summary":"Fairy Pools · Talisker Bay · Elgol Beach — Cuillin panorama","mc":[57.22,-6.3],"mz":10,"stops":[{"n":"Wake Up","ic":"☀️","t":"6:30 AM","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Tole+Staffin+Isle+of+Skye","info":"Starting location: Oor Neuk — Tole, Staffin, Isle of Skye. Drive to first stop: ~37 min."},{"t":"~7:30 AM","ic":"🥾","n":"📵 Quiraing ⭐","drive_override":30,"dur":210,"c":[57.638,-6.27],"info":"The most dramatic landscape on Skye — ancient landslip has created a labyrinth of pinnacles, cliffs and hidden plateaux on the Trotternish Ridge. The Circuit passes the Prison, Needle and Table formations before climbing the ridge for sweeping coastal views. Go c
