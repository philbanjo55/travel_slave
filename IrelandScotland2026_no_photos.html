ounter-clockwise: steep stone steps first, ridge descent second.","log":"Quiraing Car Park · IV51 · £3 up to 3hrs / £5 up to 6hrs\nCard or coins · Do NOT park on verges (soft peat — you will get stuck)","map":"https://maps.google.com/?q=57.638,-6.27","alltrails":"https://www.alltrails.com/trail/scotland/highlands/the-quiraing-circuit?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality"},{"t":"~12:15 PM","ic":"📷","n":"⚠️ Fairy Pools ⭐","drive_override":75,"dur":120,"c":[57.249949699999995,-6.27302],"info":"Crystal clear pools and cascades fed by meltwater off the Black Cuillin gabbro and peridotite — some of the oldest exposed rock in Britain. The water is extraordinarily clear because the igneous rock contains almost no soluble minerals. Three shooting positions: the main wide cascade looking upstream toward the ridge (Shot 1), a turbulent boulder rapid above the pools (Shot 2), and the natural underwater arch connecting two pools (Shot 3, calm water only). At 7am the path is yours — crowds arrive by 10am. Tripod feet go in the stream — mid-calf waterproof boots required.","photo":"Shot 1 — Wide Cascade: Landscape, 75mm, orange filter. Camera 10 inches off water surface. Waterfall as horizontal band at upper third, pool foreground with visible submerged cobbles, Cuillin ridge symmetric in upper third. 1–3 sec exposure. Zone: ridge I–III · cascade VIII · pool IV–VI · sky II–IV.\nShot 2 — Turbulent Rapid: Portrait, 90mm, orange filter. Boulder field rapid above main pools. One large gabbro boulder dominates foreground lower right, water wraps around it. 1–3 sec. Zone: wet gabbro I–III · ribbon water VII–VIII · foam VIII–IX · ridge II–III.\nShot 3 — The Arch (bonus, calm water only): Portrait, 150mm, no filter. Underwater arch between pools from above at slight upstream angle. Requires glassy calm surface. Zone: arch II–III through water surface IV–V.","log":"⚠️ PATCHY — Glen Brittle, unreliable. Download offline.\nCar park on B8009, Glenbrittle · £8 per vehicle (community-run)\nWalk: 2.4km each way · 20 min to first pools · Well-maintained gravel path\nArrive car park 7:00am · First pools 7:20am · Shoot 7:20–9:30am · Back to car 10:00am\n🥾 Mid-calf waterproof boots required — tripod feet in stream\n☂️ Tripod-mountable umbrella","map":"https://maps.google.com/maps/place/?q=place_id:ChIJXzYSLAU5jEgRIJ04nVIQ7tA","hist":"The name 'Fairy Pools' is a 1930s marketing invention — coined by a tour guide, first appearing in a guidebook. Before that, the location was known solely as Coire na Creiche: 'corrie of the spoils.'\n\nThe spoils refer to the Battle of Coire na Creiche, 1601 — fought right here. Known as the Wars of the One-Eyed Woman: the MacLeod of Dunvegan offered his sister Margaret in a trial marriage to the MacDonald of Sleat. When she failed to become pregnant within the year she was returned to her brother tied to a horse, led by a one-eyed servant with a one-eyed dog — a calculated humiliation designed to start a war. It worked. The MacDonalds won but the slaughter was so extreme the pools are said to have run red with blood. King James VI personally intervened and ended the feud. Last clan battle on Skye.\n\nThe selkie legend is also attached to Glenbrittle: shape-shifting seal-people who shed their skins at the beach and bathed in the pools under a full moon. Unlike the fairy name, the selkie association is genuine older folklore.\n\nThe water clarity comes from the gabbro and peridotite of the Black Cuillin — approximately 60 million years old, containing almost no soluble minerals. The water is essentially distilled by altitude and rapid descent.","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"~3:00 PM","ic":"📷","n":"📵 Talisker Bay","dur":150,"drive_override":40,"c":[57.28910,-6.43447],"info":"Remote beach enclosed by two cliff headlands. North end: near-vertical 100-metre cliff with a waterfall that drops onto the beach and, in a westerly gale, reverses entirely — driven back up the cliff face in sheets. South end: a large sea stack accessible by scrambling at low tide. The beach is a mixture of black volcanic sand and lighter grey grains mottled by burns into marbled patterns that change with every tide. Three compositionally distinct shots from three positions on the same beach.","photo":"Shot 1 — Bay Curve with Cliff: Landscape, 75mm, orange filter. South end looking northeast, camera low 18 inches. Cobble foreground diagonal leads left. Cliff fills left half, sea stack far right. Orange restructures cliff from green-over-grey to pale-cap-over-dark-wall. Zone: cobbles III–V dry · II–IV wet · cliff basalt I–III · grass cap IV–V · sea IV–V.\nShot 2 — Burn to the Stack: Landscape, 90mm, orange filter. Burn channelling through pebbles to sea as leading line to stack, camera very low. Wet/dry pebble separation is the tonal key. Zone: burn V–VII · wet pebbles II–IV · dry pebbles IV–VI · stack III–V · cliff I–III.\nShot 3 — Waterfall Cliff: Portrait, 150mm, orange filter. Face the north cliff directly. Cliff fills 60–70% of frame. Waterfall a single thread from near top — reversal in wind is a stronger shot. 1 sec smooths the sea at base. Zone: cliff I–III · waterfall VIII (don't block) · foam VIII · sky III–IV.","log":"📵 NO SIGNAL — remote west Skye coast. Satellite device active.\nPark at road end near Talisker village (NOT Talisker Distillery — that's Carbost, 3 min away)\nNo formal car park · Roadside only · ~10 cars max · Arrive by 11am\nWalk: 1.7km on good gravel path · ~20 min · Flat · Some muddy sections\nNo facilities on beach — bring water and food\nTide tables: aim within 2 hours of low tide for full sand and stack access\n🥾 Mid-calf waterproof boots · ☂️ Tripod-mountable umbrella\nAllow 2 hours on beach · Depart ~1:30pm\nTalisker Distillery 3 min away in Carbost · Open from 10am if time allows","map":"https://maps.google.com/?q=Talisker+Bay+Isle+of+Skye+Scotland","hist":"Hugh MacAskill took ownership of Talisker Estate in 1825. His first act was to clear the tenants — families evicted for sheep farming, many emigrating to Nova Scotia and Cape Breton Island. That same cleared land grew the barley for Talisker Distillery, co-founded with his brother Kenneth in 1830. The distillery was built on the proceeds of the Clearances. It burned down in 1960 and was rebuilt the same year.\n\nRobert Louis Stevenson praised Talisker in his poem 'The Scotsman's Return from Abroad,' calling it among the kings of drinks. The line appears on Talisker bottles to this day. His father Thomas Stevenson — the great lighthouse engineer — built the lighthouse at Rubha nan Clach, just visible around the northern headland. Father built the lighthouse; son praised the whisky.\n\nTalisker House — the white manor on the path to the beach, built in the 1720s — was for centuries the residence of the heir to Clan MacLeod chief. Sold in 2019 for £1.2 million.\n\nThe waterfall reversal — water driven back up the cliff by Atlantic westerlies — is the same physics as the Mealt Falls at Kilt Rock. Both are globally rare.","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"~6:00 PM","ic":"⛳","n":"🏌️ Drop James — Isle of Skye Golf Club","c":[57.3100817,-6.0950514],"info":"James tee time at Isle of Skye Golf Course. 18 holes, 7:00 PM. Ref: BMEG2-XUYQ1-969 · £40 green fee · With Jack Cyr.","log":"Isle of Skye Golf Course · Sconser, Isle of Skye IV48 8TD\nTee time: 19:00 · 18 holes\nRef: BMEG2-XUYQ1-969 · Paid £80 total","drive_override":30,"dur":0,"map":"https://maps.google.com/maps/place/?q=place_id:ChIJQS1HllYljEgRUsNNbo2lY5g"},{"t":"~6:40 PM","ic":"📷","n":"📵 Elgol Beach — Cuillin Panorama ⭐","drive_override":45,"c":[57.157,-6.109],"info":"The finest sea-level panorama of the Black Cuillin Ridge in existence. From Elgol you look northwest across Loch Scavaig directly inside the Cuillin horseshoe. The foreground geology spans 170-million-year-old Jurassic sandstone cut by 60-million-year-old basaltic dykes — 110 million years of geological time readable in a single boulder field. Three shots across the afternoon and evening: full panorama on arrival (~4pm), wave surge on the flat sandstone shelf (~5–7pm), yellow honeycomb sandstone overhang against Blà Bheinn in low sun (~8–9pm).","photo":"Shot 1 — Full Panorama (~4pm): Landscape, 75mm, red filter. Mid-beach looking northwest. Complete Cuillin sweep upper third, loch mid-ground, algae-covered boulders lower third. Algae goes dark I–III with red filter. Zone: ridge I–III · sky II–III · loch IV–V · algae boulders I–III · dry pebbles IV–V.\nShot 2 — Wave Surge on the Shelf (~5–7pm): Landscape, 90mm, red filter. Flat sandstone shelf north of pier extending into loch. Camera at water level. 1–3 sec as waves surge across. ⚠️ Boots in water — tide can engulf the shelf. Zone: surging water VII–IX · shelf rock III–V · loch IV–V · ridge I–III · sky II–III.\nShot 3 — Yellow Overhang and Blà Bheinn (~8–9pm): Portrait, 90mm, orange filter. Yellow honeycomb sandstone cliff fills right half of frame, Blà Bheinn left against sky. Needs raking low sun from northwest. Zone: sandstone VI–VIII · pockets II–IV · Blà Bheinn I–III · loch IV–V · sky II–IV.","log":"📵 NO SIGNAL — very remote south Skye. Satellite device active. Download offline.\nFree car park at harbour · Elgol IV49 9BJ\nWalk to beach: 5 min from car park to rocks north of pier\nB8083 from Broadford · 14 miles single track · Allow 40 min\nTide tables critical — foreground shelf access changes with tide\nArrive 4:00pm · Shot 1 ~4pm · Shot 2 ~5–7pm · Shot 3 ~8–9pm\nLeave by 9:00pm · B8083 → A87 north → A855 north ~1hr 20min\n🥾 Mid-calf waterproof boots essential for shelf · ☂️ Tripod-mountable umbrella\nCuillin View Coffee Shop in upper Elgol — open on arrival if needed","map":"https://maps.google.com/?q=Elgol+Beach+Isle+of+Skye+Scotland","hist":"Bonnie Prince Charlie sheltered at Elgol on 4 July 1746 — ten weeks after Culloden. The Clan MacKinnon hid him here at considerable personal risk. He sailed overnight from Elgol harbour to Mallaig on the mainland, spending a further ten weeks in hiding before escaping to France. A cave on the headland south of the village — accessible only two hours either side of low tide — is known as Bonnie Prince Charlie's Cave.\n\nJMW Turner came to Loch Coruisk — accessible by boat from Elgol jetty — in 1831, the year after Sir Walter Scott published Lord of the Isles romanticising the Cuillin. Turner's painting became one of the most celebrated British landscape paintings of the 19th century. Tennyson visited the same loch and saw nothing but thick white fog.\n\nSir Walter Scott visited Loch Coruisk in 1814 and set part of The Lord of the Isles (1815) there, describing the Cuillin as the most savage landscape in Britain. The publication triggered the Victorian tourist boom that invented the Highland landscape as a destination.\n\nThe foreground geology spans two eras: Jurassic sandstone 170 million years old — remnants of a warm shallow sea — cut by basaltic dykes from the Cuillin volcanic episode 60 million years ago. 110 million years of geological time in a single boulder field at eye level.\n\nWhite-tailed eagles — the largest bird of prey in Britain, reintroduced to Skye in the 1970s from Norway — hunt Loch Scavaig regularly. Seals haul out on the loch rocks. Basking sharks and dolphins reported offshore in summer.","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"~10:30 PM","ic":"🏠","n":"Return — Oor Neuk","c":[57.45709,-6.29806],"info":"Return drive from Elgol to Oor Neuk. Last night at Oor Neuk — check-out July 3.","photo":"","log":"🚗 B8083 east → A87 north → A855 north to Staffin\n~1hr 20min drive · Arrive ~10:30–11pm\nBag exposed film holders · Note emulsion numbers\n⚠️ Last night at Oor Neuk · Check-out July 3","map":"https://maps.google.com/?q=Oor+Neuk+Tole+Staffin+Isle+of+Skye","hist":"","imgs":[]}],"sb":{"n":"Oor Neuk — Tole, Staffin, Isle of Skye","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Tole+Staffin+Isle+of+Skye"},"sa":{"n":"Oor Neuk — Tole, Staffin, Isle of Skye","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Tole+Staffin+Isle+of+Skye"}},{"id":12,"date":"Jul 3","dow":"Fri","region":"scotland","checked":true,"title":"Skye → Edinburgh","summary":"Check out Oor Neuk · Drive south · Rannoch Moor second pass · Arrive Edinburgh","mc":[56.8,-4.5],"mz":7,"stops":[{"n":"Wake Up","ic":"☀️","t":"8:00 AM","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Tole+Staffin+Isle+of+Skye","info":"Starting location: Oor Neuk — Tole, Staffin, Isle of Skye. Drive to first stop: ~5 min."},{"t":"8:30 AM","ic":"🏨","n":"Check Out — Oor Neuk","c":[57.45709,-6.29806],"info":"Check out by 10:00am. Load up, begin the long drive south.","log":"Oor Neuk, Tole, Staffin IV51 9PG · Conf: 6926.868.123\nPhone: +44 7810 237996 · Check-out: 10:00","map":"https://maps.google.com/?q=Tole+Staffin+Isle+of+Skye"},{"t":"~11:00 AM","ic":"📷","n":"Corpach Wreck — Old Boat of Caol","drive_override":150,"dur":45,"c":[56.8418828,-5.1160156],"info":"26-metre fishing vessel beached on Loch Linnhe in a 2011 storm. Rusting hull with Ben Nevis as backdrop.","log":"Corpach Basin · PH33 7JH · Free parking\n10-15 min walk: canal path to footbridge to beach\nBest shot: cross the stream for hull and Ben Nevis in same frame\nCheck tide - low tide reveals more hull","map":"https://maps.google.com/maps/place/?q=place_id:ChIJHe5PcQDNjkgRVXbcGMqHW7I"},{

"c":[56.3432,-2.8038],
"info":"The Home of Golf — a full afternoon covering lunch, the Old Course, shopping and the Cathedral ruins. All stops are walkable from Links Car Park (free).",
"log":"SCHEDULE:\n3:15 PM - Lunch: Mitchells Deli or Forgans, Market Street\n4:15 PM - Swilcan Bridge photos (18th fairway, Old Course) 45 min\n5:00 PM - R&A Golf Shop (next to clubhouse) 30 min\n5:30 PM - St Andrews Links Trust Golf Shop 30 min\n6:00 PM - Himalayas Putting Course (18 holes, book online) 45 min\n6:45 PM - St Andrews Cathedral ruins + Castle 30 min\n7:15 PM - Drive to Edinburgh 1.5 hrs\n\nParking: Links Car Park free - all stops within 15 min walk\nHimalayas: Book 18-hole Blue course online - 3-5 GBP per person\nCathedral: Free grounds, small fee for tower climb","map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc"}],"sb":{"n":"Oor Neuk — Tole, Staffin, Isle of Skye","c":[57.45709,-6.29806],"map":"https://maps.google.com/?q=Tole+Staffin+Isle+of+Skye"},"sa":{"n":"Fraser Suites Edinburgh — St Giles St","c":[55.949999899999995,-3.1918984],"map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc"}},{"id":13,"date":"Jul 4","dow":"Sat","region":"scotland","checked":true,"title":"Edinburgh — Golf + Photography","summary":"Morning golf · Arthur's Seat · Calton Hill sunset · Greyfriars Kirkyard","mc":[55.948,-3.188],"mz":13,"stops":[{"n":"Wake Up","ic":"☀️","t":"7:27 AM","c":[55.949999899999995,-3.1918984],"map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc","info":"Starting location: Fraser Suites Edinburgh — St Giles St. Drive to first stop: ~12 min."},{"t":"9:30 AM","ic":"🏰","n":"✅ Edinburgh Castle — Guided Tour","c":[55.9486,-3.1999],"info":"Pre-booked guided tour. 3 tickets, order #20260311-222308071. Arrive by 9:30am to check in with guide at Tour Meeting Point (just through Main Gate, to the right). Radio earpiece provided. Tour runs 9:45–10:15am. Allow extra time after to explore independently.","photo":"Scottish Crown Jewels and Stone of Destiny in the Royal Palace. Half Moon Battery for panoramic views over Princes Street Gardens. The One O'Clock Gun platform. Esplanade gives the classic full castle exterior shot from below.","log":"✅ SIGNAL OK — Edinburgh city centre\nEdinburgh Castle, Castlehill EH1 2NG\nOrder: #20260311-222308071 · eTickets on mobile\nGuided Tour 9:45–10:15am · £30/person · 3 adults = £90","map":"https://maps.google.com/?q=Edinburgh+Castle+Scotland","hist":"Edinburgh Castle: 900 years of siege, coronation, and supernatural event.\n\nThe castle sits on Castle Rock — the plug of an ancient volcano that last erupted approximately 350 million years ago. The rock rises 130 metres above the surrounding plain and was inhabited as early as 900 BC by an Iron Age community. The oldest surviving building is St Margaret's Chapel, built around 1130 by King David I in memory of his mother, Queen Margaret — it is the oldest building in Edinburgh and has been in continuous religious use ever since.\n\nMary Queen of Scots gave birth to the future James VI of Scotland (and James I of England) here in June 1566 — in a tiny closet room barely large enough for a bed, chosen deliberately because its single window allowed witnesses to see there was no possibility of substituting a different infant. The Scottish Crown Jewels — the Honours of Scotland, the oldest crown jewels in Britain, predating the English Crown Jewels by over a century — were hidden in a locked chest after the Act of Union in 1707 and forgotten for 111 years. In 1818, Sir Walter Scott obtained royal permission to search the castle for them. He found them in a dusty chest exactly where they had been left. During WWII, the Crown of Scotland was hidden in a medieval latrine (toilet) in David's Tower.\n\nThe Stone of Destiny, seized by Edward I of England in 1296 and built into the Coronation Chair at Westminster Abbey, was used for every English and British coronation until 1953. In 1950, four Scottish students broke into Westminster Abbey on Christmas Day and stole the Stone — it broke in two during removal. Three months later it was found at Arbroath Abbey, wrapped in a Scottish flag. Many historians believe the original Stone may never have been taken — that the monks of Scone gave Edward I a plain block of sandstone while hiding the real Stone. The castle's most persistent legend involves the Piper Boy — a boy sent to explore newly discovered tunnels, whose bagpipes could be heard moving along the Royal Mile until, near the Tron Kirk, the music stopped. He was never seen again."},{"t":"11:00 AM","ic":"📷","n":"Castle Exterior Walk — Princes St Gardens + Vennel","dur":90,"c":[55.9496,-3.2003],"info":"Exterior photography circuit of Edinburgh Castle. All within 15 min walk of the castle gate.","log":"CIRCUIT:\nPrinces Street Gardens — south-facing view of castle on the rock (classic angle)\nThe Vennel Steps — framed castle view between buildings with lamppost (Grassmarket)\nGrassmarket — castle looming overhead\nPrinces Street — long axis shot with Scott Monument\n\nAll free · No entry required · Morning light hits south face well","map":"https://maps.google.com/?q=Princes+Street+Gardens+Edinburgh","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"12:30 PM","ic":"🍽️","n":"✅ Lunch + Old Town Wander","c":[55.9496,-3.1928],"info":"The Royal Mile, Grassmarket, Victoria Street (said to inspire Diagon Alley). Walk off the golf.","log":"Victoria Street: Edinburgh EH1 2JW · Grassmarket: Edinburgh EH1 2JR","map":"https://maps.google.com/?q=Victoria+Street+Edinburgh+Scotland","hist":"Dean Village and the Old Town: 800 years in a hidden gorge.\n\nDean Village has existed as a separate community for over 800 years, sitting 30 metres below the rest of Edinburgh in the gorge of the Water of Leith. It was the center of Edinburgh's grain milling industry from at least the 12th century — at peak operation, 11 watermills ran continuously along this short stretch of river, grinding grain for the entire city. The Incorporation of Baxters (bakers) Guild administered the mills under a charter dating to 1584. By the 19th century the mills had closed and Dean Village became a notorious slum. Rescued in the 1970s–80s by architectural conservation, it is now one of the most photographed areas of the city — completely invisible from the streets above.\n\nThe Royal Mile runs from the Castle to Holyrood Palace — one of the most historically dense streets in Europe. John Knox, the Protestant reformer whose confrontations with Mary Queen of Scots helped shape Scotland's religious identity, lived on the Royal Mile. The Real Mary King's Close is an entire 17th-century street buried under later construction — residents were not evicted during the plague as legend claims, but the street was roofed over and built upon. Deacon Brodie — a respectable Edinburgh cabinet-maker by day and burglar by night — inspired Robert Louis Stevenson's Dr Jekyll and Mr Hyde. He was hanged in 1788 on a gallows he himself had designed in a previous contract.\n\nThe Vennel is a close off the Grassmarket offering the finest framed view of Edinburgh Castle in the city — the entire castle profile appears through a gap in the old Flodden Wall, which was built in panic after the Scottish defeat at Flodden Field (1513). The Grassmarket itself was Edinburgh's primary place of public execution — approximately 100 people hanged here between 1660 and 1784. The most remarkable execution: Maggie Dickson (1724), hanged for concealing the death of an illegitimate child, placed in a coffin, carted away — and then heard hammering from inside. The noose had failed to break her neck. Scottish law held a sentence, once carried out, could not be repeated. She was freed, lived another 40 years, and is commemorated by a pub near the Grassmarket today."},{"t":"5:00 PM","ic":"📷","n":"✅ Arthur's Seat — Nether Hill Circular","c":[55.951133,-3.169840],"dur":90,"info":"Extinct volcano, 251m above Edinburgh. 360° views of the city, Firth of Forth, Pentland Hills and Highlands. Via Nether Hill Circular — 1.6 mi loop, 1–1.5 hrs, moderate.","log":"Holyrood Car Park · 55.951133,-3.169840 · Free\nAllTrails: Nether Hill Circular · 1.6 mi · 501 ft elevation · 1–1.5 hrs\nRoute: stone steps up Volunteer's Walk → Nether Hill → rocky summit → Piper's Walk descent\nRocky summit — good grip footwear essential · Can be slippery","alltrails":"https://www.alltrails.com/trail/scotland/edinburgh/arthurs-seat-via-the-nether-hill-circular?sh=jrrmvi&u=i&utm_medium=trail_share&utm_source=alltrails_virality","map":"https://maps.google.com/?q=55.951133,-3.169840","imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]},{"t":"7:00 PM","ic":"📷","n":"✅ Calton Hill","c":[55.9554,-3.1801],"info":"The most famous photography viewpoint in Edinburgh. Nelson Monument and National Monument (Parthenon columns) with the castle below.","photo":"Classic Edinburgh skyline — castle and Old Town below, National Monument columns as frame. Evening: city lights begin. Wide angle captures the full panorama.","log":"✅ SIGNAL OK — Edinburgh city centre\nAccess from Regent Road, Edinburgh · Free · Always open\n10 min walk from Princes Street","map":"https://maps.google.com/?q=Calton+Hill+Edinburgh+Scotland","hist":"Greyfriars Kirkyard: J.K. Rowling's graveyard, Greyfriars Bobby, and the world's most violent poltergeist.\n\nThe kirkyard opened in 1562 and contains some of the most elaborate 17th-century funerary monuments in Scotland. It was also the site of the signing of the National Covenant (1638), when tens of thousands of Scots signed a document rejecting Charles I's attempts to impose bishops on the Presbyterian church — an act of religious defiance that led to decades of civil war.\n\nThe most famous resident is Greyfriars Bobby — a Skye Terrier who, after his owner John Gray died in 1858, guarded the grave for 14 years until his own death in 1872. The Lord Provost of Edinburgh gave him a special licence so he could live in the city without an owner. His water bowl was replaced daily. A statue was erected in 1873; rubbing Bobby's nose is believed to bring good luck, and the bronze nose has been polished bright by millions of hands. The City of Edinburgh has twice had to replace the nose after it was rubbed completely smooth.\n\nJ.K. Rowling spent years writing in the nearby Elephant House café and the Spoon café with a view of the castle. Greyfriars Kirkyard contains the graves of Thomas Riddell (died 1806), William McGonagall (the famously terrible poet), Professor John Murray, John Gray (Bobby's owner), and others whose names she transferred to Harry Potter characters. Tom Riddle became Lord Voldemort; McGonagall became Professor McGonagall. The graveyard is now a pilgrimage site for Harry Potter fans from around the world.\n\nThe Mackenzie Poltergeist is considered the best-documented supernatural case in the world. Sir George \"Bluidy\" Mackenzie imprisoned 1,200 Covenanters in a walled field next to the kirkyard in 1679 — many died of exposure. In 1999, a homeless man broke into Mackenzie's mausoleum seeking shelter and accidentally fell into an old plague pit. From that point, visitors began reporting scratches, bruises, burns, bites — inexplicable physical attacks occurring under their clothing. Over 500 documented cases have been recorded. Two exorcisms were attempted; both exorcists collapsed. The tours specifically warn visitors: \"The Mackenzie Poltergeist can cause genuine physical and mental distress. Participate at your own risk.\" "},{"t":"8:30 PM","ic":"📷","n":"✅ Greyfriars Kirkyard","c":[55.9468,-3.1921],"info":"17th century graveyard. Famous for Greyfriars Bobby, elaborate carved memorials, and the Covenanters' Prison.","photo":"Low-angle shots of ornate carved gravestones with kirkyard trees. Evening light from the west illuminates the carvings.","log":"✅ SIGNAL OK — Edinburgh city centre\nGreyfriars Place, Edinburgh EH1 2QQ · Free · Always open","map":"https://maps.google.com/?q=Greyfriars+Kirkyard+Edinburgh+Scotland","hist":"Dean Village: a hidden medieval milling community in the heart of a capital city.\n\nDean Village has existed as a separate community for over 800 years, sitting 30 metres below the rest of Edinburgh in the gorge of the Water of Leith. It was the center of Edinburgh's grain milling industry from at least the 12th century — at peak operation, 11 watermills ran continuously along this short stretch of river, grinding grain for the entire city. The Incorporation of Baxters (bakers) Guild administered the mills under a charter dating to 1584, controlling grain prices and quality for the city above.\n\nBy the 19th century the mills had closed, replaced by industrial technology, and Dean Village became a notorious slum. It was rescued in the 1970s and 1980s by architectural conservation, and is now one of the most photographed areas of the city — completely invisible from the streets above, quiet even in high tourist season.\n\nThe Water of Leith walkway runs 12 miles from the Pentland Hills through the village and down to Leith on the Firth of Forth. Robert Louis Stevenson walked this route regularly as a student. Edinburgh's only surviving Roman fort is visible on the riverbank a mile upstream at Cramond, where the Water of Almond meets the Firth of Forth."}],"sb":{"n":"Fraser Suites Edinburgh — St Giles St","c":[55.949999899999995,-3.1918984],"map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc"},"sa":{"n":"Fraser Suites Edinburgh — St Giles St","c":[55.949999899999995,-3.1918984],"map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc"}},{"id":14,"date":"Jul 5","dow":"Sun","region":"travel","checked":true,"title":"Departure — Home","summary":"6am depart Edinburgh · FR809 EDI→DUB · EI 117 DUB→IAD · Land Dulles 3:45pm","mc":[55.95,-3.37],"mz":10,"stops":[{"n":"Wake Up","ic":"☀️","t":"5:35 AM","c":[55.949999899999995,-3.1918984],"map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc","info":"Starting location: Fraser Suites Edinburgh — St Giles St. Drive to first stop: ~5 min."},{"t":"6:00 AM","ic":"🏨","n":"Depart Fraser Suites","c":[55.949999899999995,-3.1918984],"info":"⚠️ Very early start. Airport is 30–45 min from hotel. FR809 departs 07:55. Arrange luggage collection the night before if possible.","log":"Fraser Suites: +44 131 221 7200 · Conf: 52611SG109917\nTaxi to EDI: ~£25–30 / 30 min","map":"https://maps.google.com/?q=Edinburgh+Airport+Scotland"},{"t":"7:55 AM","ic":"✈️","n":"FR809 — EDI → DUB","c":null,"info":"Ryanair. Land Dublin 09:00. 3.5 hour connection to EI 117.","log":"Flight: FR809 · Ryanair\nDeparts: 07:55 EDI · Arrives: 09:00 DUB\nConf: U72I6U","map":null},{"t":"9:00 AM","ic":"⏳","n":"Dublin — Connection Layover","c":null,"info":"International to international connection. Clear through the terminal. Airside food and shops while waiting.","log":"Dublin Airport · Terminal 1 → Terminal 2\nEI 117 departs 12:35","map":"https://maps.google.com/?q=Dublin+Airport+Ireland"},{"t":"12:35 PM","ic":"✈️","n":"EI 117 — DUB → IAD — HOME ✅","c":null,"info":"Final leg home. Arrives Washington Dulles 15:45. Get film holders organised — first thing after landing: ship everything to Praus Productions.","log":"Flight: EI 117 · Aer Lingus\nDeparts: 12:35 DUB · Arrives: 15:45 IAD\nConf: 2JWMSW\n\n── Post-trip ──\nPraus Productions · Rochester NY\n4x5 development: $3.50/sheet · D-76 1:1\nScanning: ~$45 tier · 1300ppi · 68MB files","map":null}],"sb":{"n":"Fraser Suites Edinburgh — St Giles St","c":[55.949999899999995,-3.1918984],"map":"https://maps.google.com/maps/place/?q=place_id:ChIJHzJ3q5rHh0gRbgAld-Ol-Jc"},"sa":{"n":"Home — Ballston, Arlington VA","c":[38.8817,-77.1042],"map":"https://maps.google.com/?q=Ballston+Arlington+VA"}}]};

function buildMap(day,s,locs){
  var el=document.getElementById('the-map');

    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:19
  }).addTo(map);

  // ── helpers ──────────────────────────────────────────────────────────────────
  function cEq(a,b){return a&&b&&a[0]===b[0]&&a[1]===b[1];}

  function matchesAnyStop(c){

  var showSb=!!(sbC&&!matchesAnyStop(sbC));
  var showSa=!!(saC&&!matchesAnyStop(saC));

  var sameSbSa=showSb&&showSa&&cEq(sbC,saC);

  // ── Full-day route polyline: sb → stops → sa ──────────────────────────────
  var routePts=[];
  if(sbC) addPt(routePts,sbC);
  for(var ri=0;ri<locs.length;ri++) if(locs[ri].c) addPt(routePts,locs[ri].c);
  if(saC) addPt(routePts,saC);
  if(routePts.length>1)
    L.polyline(routePts,{color:s.accent,weight:2.5,opacity:0.55,dashArray:'6,4'}).addTo(map);

  // ── START / HOME BASE pin ─────────────────────────────────────────────────
  if(showSb){
    var lbl=sameSbSa?'&#8962;':'&#9654;';
    var title=sameSbSa?'HOME BASE':'DEPART FROM';
    var bg=sameSbSa?'#0369A1':'#16A34A';
    var icon=L.divIcon({
      html:'<div style="width:30px;height:30px;border-radius:7px;background:'+bg+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);">'+lbl+'</div>',
      className:'',iconSize:[30,30],iconAnchor:[15,15]

      +'<div style="font-size:13px;font-weight:600;color:#1C1917;margin-top:3px;line-height:1.3">&#127968; '+e(sb.n)+'</div>'
      +(sb.map?'<a href="'+e(sb.map)+'" target="_blank" style="font-size:11px;color:'+bg+';display:block;margin-top:7px">&#128205; Open in Maps &#x2197;</a>':'')
      +'</div>';
    L.marker(sbC,{icon:icon}).addTo(map).bindPopup(L.popup({maxWidth:240,offset:[0,-8]}).setContent(sbHtml));
  }

  // ── Numbered stop markers ─────────────────────────────────────────────────
  for(var i=0;i<locs.length;i++){
    if(!locs[i].c) continue;
    (function(st,num){
      var icon=L.divIcon({
        html:'<div style="width:26px;height:26px;border-radius:50%;background:'+s.accent+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);">'+num+'</div>',
        className:'',iconSize:[26,26],iconAnchor:[13,13]
      ,"imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"],"imgs":["__PHOTO_STRIPPED__","__PHOTO_STRIPPED__","__PHOTO_STRIPPED__"]});
      var ph='<div style="font-family:sans-serif;padding:2px 0">'
        +'<div style="font-size:10px;color:#78716C;letter-spacing:.05em">'+e(st.t)+'</div>'
        +'<div style="font-size:13px;font-weight:600;color:#1C1917;margin-top:3px;line-height:1.3">'+e(st.ic)+' '+e(st.n)+'</div>'
        +(st.map?'<a href="'+e(st.map)+'" target="_blank" style="font-size:11px;color:'+s.accent+';display:block;margin-top:7px">&#128205; Open in Maps &#x2197;</a>':'')
        +'</div>';
      L.marker(st.c,{icon:icon}).addTo(map).bindPopup(L.popup({maxWidth:240,offset:[0,-8]}).setContent(ph));
    })(locs[i],i+1);
  }

  // ── END / ARRIVAL pin (different location from start, not already a stop) ─
  if(showSa&&!sameSbSa){
    var saIcon=L.divIcon({
      html:'<div style="width:30px;height:30px;border-radius:7px;background:#DC2626;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);">&#9632;</div>',
      className:'',iconSize:[30,30],iconAnchor:[15,15]
    });
    var saHtml='<div style="font-family:sans-serif;padding:2px 0">'
      +'<div style="font-size:10px;color:#78716C;letter-spacing:.05em">SLEEP HERE TONIGHT</div>'

      +'</div>';
    L.marker(saC,{icon:saIcon}).addTo(map).bindPopup(L.popup({maxWidth:240,offset:[0,-8]}).setContent(saHtml));
  }

  // ── Fit map bounds to all rendered points ─────────────────────────────────
  var allPts=[];
  if(showSb) allPts.push(sbC);
  for(var ai=0;ai<locs.length;ai++) if(locs[ai].c) allPts.push(locs[ai].c);
  if(showSa) allPts.push(saC);
  if(allPts.length>1) map.fitBounds(L.latLngBounds(allPts),{padding:[44,44]});
  else if(allPts.length===1) map.setView(allPts[0],day.mz||10);

function goDay(id){

    var tabs=document.getElementById('tabs');
    var offset=(hdr?hdr.offsetHeight:0)+(tabs?tabs.offsetHeight:0)+4;
    var top=sec.getBoundingClientRect().top+window.pageYOffset-offset;
    window.scrollTo({top:top,behavior:'auto'});

    activeDay=id;
    var tabEls=document.querySelectorAll('#tabs-inner .tab');
    tabEls.forEach(function(t){
      var td=parseInt(t.getAttribute('data-day'));

        var d=DAYS.filter(function(x){return x.id===id;})[0];

function editTime(el, dayId, stopIdx){
  var current=el.textContent.trim();
  var input=document.createElement('input');
  input.className='stime-edit';
  input.value=current;
  input.setAttribute('data-day',dayId);
  input.setAttribute('data-stop',stopIdx);
  el.replaceWith(input);
  input.focus();
  input.select();

  function commit(){
    var val=input.value.trim();
    if(!val){val=current;}
    // Normalise: "9am"->"9 AM", "9:30pm"->"9:30 PM", "9:30 AM"->unchanged
    val=val.replace(/([0-9])(am|pm)/i,function(m,h,ap){return h+' '+ap.toUpperCase();})
           .replace(/([0-9]:[0-9]{2})(am|pm)/i,function(m,t,ap){return t+' '+ap.toUpperCase();});
    // Update the DAYS data
    var d=DAYS.filter(function(x){return x.id===parseInt(dayId);})[0];
    if(d&&d.stops[stopIdx]) d.stops[stopIdx].t=val;
    // Rebuild drive data for affected day
    DRIVE_DATA=buildDriveData();
    // Re-render
    renderAllDays();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e){
    if(e.key==='Enter') input.blur();
    if(e.key==='Escape'){input.value=current; input.blur();}
  });
}

  var sb=day.sb||null,sa=day.sa||null;
  var routePts=[];
  if(sb&&sb.c) addPtL(routePts,sb.c);
  for(var ri=0;ri<locs.length;ri++) if(locs[ri].c) addPtL(routePts,locs[ri].c);
  if(sa&&sa.c) addPtL(routePts,sa.c);
  if(routePts.length>1) L.polyline(routePts,{color:s.accent,weight:2,dashArray:'6 4',opacity:0.6}).addTo(map);
  for(var pi=0;pi<locs.length;pi++){

        +'</div>';
      dot.bindPopup(popup,{maxWidth:200});

}





// ── Drive data built live from DAYS — single source of truth ─────────────
function buildDriveData(){
  var dd={};
  function hkm(c1,c2){
    var R=6371,tr=Math.PI/180;
    var dlat=(c2[0]-c1[0])*tr,dlon=(c2[1]-c1[1])*tr;
    var a=Math.sin(dlat/2)*Math.sin(dlat/2)+Math.cos(c1[0]*tr)*Math.cos(c2[0]*tr)*Math.sin(dlon/2)*Math.sin(dlon/2);
    return 2*R*Math.asin(Math.sqrt(a));
  }
  function pt(t){
    if(!t) return null;
    t=t.replace(/^~/,'').trim();
    var m=t.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM)/i);
    if(!m) return null;
    var h=parseInt(m[1]),mn=parseInt(m[2]||0),ap=(m[3]||'').toUpperCase();
    if(ap==='PM'&&h!==12) h+=12; if(ap==='AM'&&h===12) h=0;
    return h*60+mn;
  }
  function ft(mins){
    if(mins===null||mins===undefined) return null;
    mins=((Math.round(mins)%1440)+1440)%1440;
    var h=Math.floor(mins/60),m=mins%60,ap=h>=12?'PM':'AM';
    h=h%12||12; return h+(m>0?':'+(m<10?'0':'')+m:'')+' '+ap;
  }
  for(var di=0;di<DAYS.length;di++){
    var day=DAYS[di],stops=day.stops,sa=day.sa||null;
    for(var i=0;i<stops.length-1;i++){
      var s1=stops[i],s2=stops[i+1];
      if(!Array.isArray(s1.c)||!Array.isArray(s2.c)) continue;
      if(s1.c[0]===s2.c[0]&&s1.c[1]===s2.c[1]) continue;
      var t2=pt(s2.t); if(t2===null) continue;
      var km=hkm(s1.c,s2.c); if(km>2000) continue;
      var avg=km<20?45:km<80?60:75;
      var dm=s2.drive_override?s2.drive_override:Math.round((km/avg*60)*1.4+5);
      dd[day.id+','+i]={km:Math.round(km*10)/10,drive_mins:dm,leave_time:ft(t2-dm),arrive_time:s2.t.replace(/^~/,'').trim(),dest_name:s2.n};
    }
    if(sa&&Array.isArray(sa.c)){
      for(var j=stops.length-1;j>=0;j--){
        var s=stops[j];
        if(!Array.isArray(s.c)||!s.t) continue;
        var key=day.id+','+j;
        if(dd[key]) break;
        var km2=hkm(s.c,sa.c); if(km2>2000) break;
        var avg2=km2<20?45:km2<80?60:75;
        var dm2=Math.round((km2/avg2*60)*1.4+5);
        var t1=pt(s.t);
        var durMins=s.dur||30;dd[key]={km:Math.round(km2*10)/10,drive_mins:dm2,leave_time:t1?ft(t1+durMins):null,arrive_time:'',dest_name:sa.n};
        break;
      }
    }
  }
  return dd;
}
var DRIVE_DATA=buildDriveData();

function parseTimeToMins(t){
  if(!t) return null;
  t=t.replace(/^~/,'').trim();
  var m=t.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if(!m) m=t.match(/(\d{1,2})\s*(AM|PM)/i);
  if(!m) return null;
  var h=parseInt(m[1]), min=m[2]&&m[2].match(/\d/)? parseInt(m[2]):0;
  var ampm=(m[3]||m[2]||'').toUpperCase();
  if(ampm==='PM'&&h!==12) h+=12;
  if(ampm==='AM'&&h===12) h=0;
  return h*60+min;
}

function minsToTime(mins){
  if(mins===null) return null;
  mins=((mins%1440)+1440)%1440;
  var h=Math.floor(mins/60), m=mins%60;
  var ampm=h>=12?'PM':'AM';
  h=h%12||12;
  return h+(m>0?':'+(m<10?'0':'')+m:'')+' '+ampm;
}

function parseTravelMins(hint){
  if(!hint) return null;
  // Patterns: ~1hr 30min, ~45min, 1 hour, 20-30 min, ~3hrs, 3hrs 30min
  var h=0, m=0;
  var hrMatch=hint.match(/(\d+)\s*h(r|our)?s?/i);
  var minMatch=hint.match(/(\d+)\s*min/i);
  // Range: take average e.g. "20-30 min" -> 25
  var rangeMatch=hint.match(/(\d+)\s*[-–]\s*(\d+)\s*min/i);
  if(rangeMatch) return (parseInt(rangeMatch[1])+parseInt(rangeMatch[2]))/2;
  if(hrMatch) h=parseInt(hrMatch[1]);
  if(minMatch) m=parseInt(minMatch[1]);
  if(h===0&&m===0) return null;
  return h*60+m;
}

function buildStopsHtml(day,s){
  var h='';
  for(var i=0;i<day.stops.length;i++){
    var st=day.stops[i];
    if(!st.info&&!st.photo&&!st.log&&!st.hist&&(!st.imgs||!st.imgs.length)) continue;

    // Transition card between stops
    if(i>0){
      var hint='',icon='🚗',prevSt=day.stops[i-1];
      var isFlight=st.ic&&(st.ic.indexOf('\u2708')>=0||st.ic.indexOf('\uD83D\uDEEB')>=0);
      if(isFlight) icon='\u2708\uFE0F';
      if(st.ic&&st.ic.indexOf('\u26F4')>=0) icon='\u26F4\uFE0F';
      if(st.log){
        var logLines=st.log.split('\n');
        for(var li=0;li<logLines.length;li++){
          var ln=logLines[li].trim();
          if(!ln) continue;
          if(ln.match(/Departs:/i)){hint=ln;break;}
          if(ln.match(/Drive from|Distance from|Total drive|drive time|drive:/i)){hint=ln;break;}
          if(ln.match(/Route:|→|->/)&&ln.length<100){hint=ln.replace(/^Route:\s*/i,'');break;}
          if(ln.match(/Walk:|walk from/i)){icon='\uD83D\uDEB6';hint=ln;break;}
          if(ln.match(/Taxi|taxi to/i)){icon='\uD83D\uDE95';hint=ln;break;}
          if(ln.match(/Bus|Airlink/i)){icon='\uD83D\uDE8C';hint=ln;break;}
          if(ln.match(/~?\d+\s*(hr|min|hour)/i)&&ln.length<80){hint=ln;break;}
          if(ln.match(/\bA\d+|\bB\d+/)&&ln.length<100){hint=ln;break;}
        }
      }
      if(!hint&&st.t&&prevSt.t) hint=prevSt.t+' \u2192 '+st.t;
      var mapsUrl='';
      if(Array.isArray(prevSt.c)&&Array.isArray(st.c)){
        var origin=prevSt.c[0]+','+prevSt.c[1];
        var dest=st.c[0]+','+st.c[1];
        var travelSuffix=isFlight?'':'&travelmode=driving';
        mapsUrl='https://www.google.com/maps/dir/?api=1&origin='+origin+'&destination='+dest+travelSuffix;
      } else if(st.map){ mapsUrl=st.map; }
      var fromName=prevSt.n.replace(/[⭐★✨]/g,'').trim();
      var toName=st.n.replace(/[⭐★✨]/g,'').trim();

      // Get leave/arrive from pre-calculated drive data
      var prevDriveKey=day.id+','+(i-1);
      var driveInfo=DRIVE_DATA[prevDriveKey]||null;
      var prevEndTime=driveInfo?driveInfo.leave_time:(prevSt.t?prevSt.t.replace(/^~/,''):'');
      var nextArrival=driveInfo?driveInfo.arrive_time:(st.t?st.t.replace(/^~/,''):'');
      var driveLabel=driveInfo?(driveInfo.drive_mins<60?driveInfo.drive_mins+' min drive':Math.round(driveInfo.drive_mins/60*10)/10+' hr drive'):null;

      h+='<div class="drive-wrap"><div class="drive-card">';
      h+='<div class="drive-card-inner">';
      h+='<div class="drive-icon">'+icon+'</div>';
      h+='<div class="drive-info">';
      h+='<div class="drive-from-to">'+e(fromName.substring(0,28))+(fromName.length>28?'&hellip;':'')+' &rarr; '+e(toName.substring(0,28))+(toName.length>28?'&hellip;':'')+'</div>';
      if(driveLabel) h+='<div class="drive-hint">'+e(driveLabel)+'</div>';
      if(hint) h+='<div class="drive-route">'+e(hint.replace(/^[\s\xb7]+/,'').trim())+'</div>';
      if(prevEndTime||nextArrival){
        h+='<div class="drive-times">'
          +(prevEndTime?'<span class="dt-leave">Leave '+e(prevEndTime)+'</span>':'')
          +(prevEndTime&&nextArrival?' &rarr; ':'')
          +(nextArrival?'<span class="dt-arrive">Arrive '+e(nextArrival)+'</span>':'')
          +'</div>';
      }
      h+='</div></div>';
      if(mapsUrl) h+='<a class="drive-maps-btn" href="'+e(mapsUrl)+'" target="_blank">📍 Get Directions ↗</a>';
      h+='</div></div>';
    }

    h+='<div class="stop-section">';
    // End time: look up drive data for depart time from this stop
    var endTime='';
    var driveKey=day.id+','+i;
    if(DRIVE_DATA[driveKey]){
      endTime=DRIVE_DATA[driveKey].leave_time;
    }
    var dayIdStr=String(day.id), stopIdxStr=String(i);
    h+='<div class="stop-head">'
      +'<div class="stime-wrap">'
      +'<div class="stime" onclick="editTime(this,'+dayIdStr+','+stopIdxStr+')" title="Tap to edit time">'+e(st.t.replace(/^~/,''))+'</div>'
      +(endTime?'<div class="stime-end">until '+endTime+'</div>':'')
      +'</div>'
      +'<div class="sic">'+e(st.ic)+'</div>'
      +'<div class="sname">'+e(st.n)+'</div>'
      +'</div>';
    if(st.alltrails){
      h+='<a class="alltrails-btn" href="'+e(st.alltrails)+'" target="_blank">'
        +'<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M13.5 2C8 2 3.5 6.5 3.5 12s4.5 10 10 10 10-4.5 10-10S19 2 13.5 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm-1-13l5 5-5 5-1.4-1.4L14.2 12l-3.6-3.6L12 7z"/></svg>'
        +' View on AllTrails ↗</a>';
    }
    if(st.imgs&&st.imgs.length) h+='<div class="stop-hero"><img src="'+st.imgs[0]+'" loading="lazy" /></div>';
    h+='<div class="blurbs">';

    if(st.info){
      var infoTruncated=st.info.length>180;
      var infoSum=infoTruncated?st.info.substring(0,180).replace(/\s\S+$/,'')+'...':st.info;
      var infoRest=infoTruncated?st.info.substring(infoSum.length-3).replace(/^\.\.\./,'').trim():'';
      var infoBody=(infoRest&&st.photo)?(infoRest+'\n\n'+st.photo):infoRest||(st.photo||'');
      var hasMoreImgs=st.imgs&&st.imgs.length>1;
      h+='<div class="blurb"><div class="blurb-lbl">Info</div><div class="blurb-sum">'+eh(infoSum)+'</div>';
      if(infoBody||hasMoreImgs){
        h+='<button class="blurb-more" onclick="toggleBlurb(this)"><span class="arr">\u25BC</span> '+(hasMoreImgs?'Read more + all photos':'Read more')+'</button>'
          +'<div class="blurb-body">'+eh(infoBody);
        if(hasMoreImgs){
          h+='<div class="blurb-gallery">';
          for(var ii=1;ii<st.imgs.length;ii++) h+='<img src="'+st.imgs[ii]+'" loading="lazy" />';
          h+='</div>';
        }
        h+='</div>';
      }
      h+='</div>';
    }

    if(st.log){
      h+='<div class="blurb"><div class="blurb-lbl">Logistics</div><div class="log-pre">'+eh(st.log)+'</div>';
      if(st.map) h+='<a class="map-lnk" href="'+e(st.map)+'" target="_blank">\uD83D\uDCCD Open in Google Maps \u2197</a>';
      h+='</div>';
    }

    if(st.hist){
      var histLines=st.hist.split('\n').filter(function(l){return l.trim();});
      var histSum=histLines[0]||'';
      if(histSum.length>200) histSum=histSum.substring(0,200).replace(/\s\S+$/,'')+'...';
      h+='<div class="blurb"><div class="blurb-lbl">History</div><div class="blurb-sum">'+eh(histSum)+'</div>';
      if(st.hist.length>histSum.length){
        h+='<button class="blurb-more" onclick="toggleBlurb(this)"><span class="arr">\u25BC</span> Read more</button>'
          +'<div class="blurb-body">'+eh(st.hist)+'</div>';
      }
      h+='</div>';
    }

    if(st.artist){
      var artLines=st.artist.split('\n').filter(function(l){return l.trim();});
      var artSum=artLines[0]||'';
      if(artSum.length>160) artSum=artSum.substring(0,160).replace(/\s\S+$/,'')+'...';
      h+='<div class="blurb blurb-artist"><div class="blurb-lbl">\uD83C\uDFA8 Artist\'s Notes</div>'
        +'<div class="blurb-sum">'+eh(artSum)+'</div>';
      if(st.artist.length>artSum.length){
        h+='<button class="blurb-more blurb-more-artist" onclick="toggleBlurb(this)"><span class="arr">\u25BC</span> Read more</button>'
          +'<div class="blurb-body">'+eh(st.artist)+'</div>';
      }
      h+='</div>';
    }

    h+='</div></div>';
  }

  // Final drive card to accommodation
  (function(){
    var lastIdx=-1;
    for(var li=0;li<day.stops.length;li++){
      var ls=day.stops[li];
      if(ls.info||ls.photo||ls.log||ls.hist||(ls.imgs&&ls.imgs.length)) lastIdx=li;
    }
    if(lastIdx<0) return;
    var lastKey=day.id+','+lastIdx;
    var driveInfo=DRIVE_DATA[lastKey];
    if(!driveInfo||!driveInfo.dest_name) return;
    var lastStop=day.stops[lastIdx];
    if(driveInfo.dest_name===lastStop.n) return;
    var sa=day.sa||null;
    var mapsUrl='';
    if(sa&&Array.isArray(sa.c)&&Array.isArray(lastStop.c)){
      mapsUrl='https://www.google.com/maps/dir/?api=1&origin='+lastStop.c[0]+','+lastStop.c[1]+'&destination='+sa.c[0]+','+sa.c[1]+'&travelmode=driving';
    }
    var dl=driveInfo.drive_mins<60?driveInfo.drive_mins+' min drive':Math.round(driveInfo.drive_mins/60*10)/10+' hr drive';
    var fromName=lastStop.n.replace(/[\u2b50\u2605\u2728]/g,'').trim();
    var toName=driveInfo.dest_name.replace(/[\u2b50\u2605\u2728]/g,'').trim();
    h+='<div class="drive-wrap"><div class="drive-card">';
    h+='<div class="drive-card-inner">';
    h+='<div class="drive-icon">\uD83C\uDFE0</div>';
    h+='<div class="drive-info">';
    h+='<div class="drive-from-to">'+e(fromName.substring(0,28))+(fromName.length>28?'&hellip;':'')+' &rarr; '+e(toName.substring(0,28))+(toName.length>28?'&hellip;':'')+'</div>';
    h+='<div class="drive-hint">'+e(dl)+'</div>';
    if(driveInfo.leave_time){
      h+='<div class="drive-times"><span class="dt-leave">Leave '+e(driveInfo.leave_time)+'</span>'+(driveInfo.arrive_time?' &rarr; <span class="dt-arrive">Arrive '+e(driveInfo.arrive_time)+'</span>':'')+'</div>';
    }
    h+='</div></div>';
    if(mapsUrl) h+='<a class="drive-maps-btn" href="'+e(mapsUrl)+'" target="_blank">\uD83D\uDCCD Get Directions \u2197</a>';
    h+='</div></div>';
  })();

  return h;
}

function getActiveDay(){
  var sections=document.querySelectorAll('.day-section');
  var best=null,bestScore=-Infinity;
  var midY=window.innerHeight*0.35;
  sections.forEach(function(sec){
    var rect=sec.getBoundingClientRect();
    if(rect.bottom<0||rect.top>window.innerHeight) return;
    var score=-(Math.abs(rect.top-midY));
    if(score>bestScore){bestScore=score;best=sec;}
  });
  return best?parseInt(best.getAttribute('data-day-id')):null;
}

function setupScrollObserver(){
  var scrollTimer=null,lastActiveDay=activeDay;
  function updateTabs(id){
    var tabs=document.querySelectorAll('#tabs-inner .tab');
    var activeTab=null;
    tabs.forEach(function(tab){
      var td=parseInt(tab.getAttribute('data-day'));
      var isActive=(td===id);
      tab.classList.toggle('active',isActive);
      tab.style.borderBottomColor=isActive?(function(){
        var d=DAYS.filter(function(x){return x.id===id;})[0];
        return d?RS[d.region].accent:'';
      })():'';
      if(isActive) activeTab=tab;
    });
    return activeTab;
  }
  window.addEventListener('scroll',function(){
    var id=getActiveDay();
    if(id!==null&&id!==lastActiveDay){
      lastActiveDay=id; activeDay=id;
      updateTabs(id);
    }
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(function(){
      var activeTab=document.querySelector('#tabs-inner .tab.active');
      var tabsEl=document.getElementById('tabs');
      if(activeTab&&tabsEl){
        var tabCenter=activeTab.offsetLeft+activeTab.offsetWidth/2;
        tabsEl.scrollLeft=tabCenter-tabsEl.offsetWidth/2;
      }
    },150);
  },{passive:true});
}
