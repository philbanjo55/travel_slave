name: Wear OS APK Build

on:
  push:
    branches: [main, update]
    paths:
      - 'wear/**'
      - '.github/workflows/wear-build.yml'
  workflow_dispatch: # allows manual trigger from Actions tab

permissions:
  contents: write  # needed for creating Releases

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle wrapper
        # Our committed gradlew is a stub; generate the real wrapper here
        working-directory: wear
        run: |
          # Use system gradle to bootstrap a real wrapper if needed
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('wear/**/*.gradle*', 'wear/gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: wear
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          APK=$(find wear/app/build/outputs/apk -name "*.apk" | head -n1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: philm-reciprocity-debug
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      - name: Create dated pre-release
        if: github.ref == 'refs/heads/update' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wear-${{ github.run_number }}
          name: Wear OS APK build #${{ github.run_number }}
          body: |
            Automated debug APK build of Philm Reciprocity for Wear OS.

            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref_name }}

            Download `${{ steps.apk.outputs.name }}` below to your phone, then
            sideload to Galaxy Watch Ultra via Wear Installer 2 or ADB.
          files: ${{ steps.apk.outputs.path }}
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
