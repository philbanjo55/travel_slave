<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0a0a0a"/>

  <!-- Outer frame corners - large format camera aesthetic -->
  <!-- Top left -->
  <rect x="80" y="80" width="120" height="12" fill="#c4a882"/>
  <rect x="80" y="80" width="12" height="120" fill="#c4a882"/>
  <!-- Top right -->
  <rect x="824" y="80" width="120" height="12" fill="#c4a882"/>
  <rect x="932" y="80" width="12" height="120" fill="#c4a882"/>
  <!-- Bottom left -->
  <rect x="80" y="932" width="120" height="12" fill="#c4a882"/>
  <rect x="80" y="824" width="12" height="120" fill="#c4a882"/>
  <!-- Bottom right -->
  <rect x="824" y="932" width="120" height="12" fill="#c4a882"/>
  <rect x="932" y="824" width="12" height="120" fill="#c4a882"/>

  <!-- Center: Stylized P+F lettermark -->
  <!-- P -->
  <rect x="340" y="360" width="18" height="304" fill="#c4a882"/>
  <rect x="340" y="360" width="120" height="18" fill="#c4a882"/>
  <rect x="340" y="492" width="120" height="18" fill="#c4a882"/>
  <rect x="442" y="360" width="18" height="150" fill="#c4a882"/>

  <!-- + separator -->
  <rect x="490" y="494" width="44" height="12" fill="#9a7f5f"/>
  <rect x="506" y="478" width="12" height="44" fill="#9a7f5f"/>

  <!-- F -->
  <rect x="554" y="360" width="18" height="304" fill="#c4a882"/>
  <rect x="554" y="360" width="130" height="18" fill="#c4a882"/>
  <rect x="554" y="492" width="100" height="18" fill="#c4a882"/>

  <!-- Subtle film strip marks bottom -->
  <rect x="180" y="880" width="28" height="40" rx="4" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="228" y="880" width="28" height="40" rx="4" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="768" y="880" width="28" height="40" rx="4" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="816" y="880" width="28" height="40" rx="4" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="2"/>
</svg>
